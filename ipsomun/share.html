<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">입소문 - 오늘의 푸드 트렌드 매거진</title>

  <!-- OG tags are set by Edge Function redirect with fragment, so crawlers see the meta from server -->
  <meta property="og:type" content="article">
  <meta property="og:title" id="og-title" content="입소문 - 오늘의 푸드 트렌드 매거진">
  <meta property="og:description" id="og-desc" content="AI가 매일 수집한 핫한 푸드 트렌드를 입소문에서 확인하세요.">
  <meta property="og:image" id="og-image" content="">
  <meta property="og:site_name" content="입소문 - 오늘의 푸드 트렌드 매거진">
  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #FAFAF8;
      color: #2C2C2B;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #f0ede8;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 20px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
    }
    .category-badge {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #E8A87C;
      margin-bottom: 8px;
    }
    .hero-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
    }
    .content { padding: 20px; }
    .score-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: #f5f3f0;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .score-number {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #C4572A;
    }
    .score-label { font-size: 13px; color: #8a8580; }
    .score-dots { display: flex; gap: 3px; margin-top: 2px; }
    .score-dot { width: 8px; height: 8px; border-radius: 50%; }
    .key-info {
      background: #f5f3f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .key-info-row {
      display: flex;
      padding: 4px 0;
    }
    .key-info-label {
      width: 56px;
      flex-shrink: 0;
      font-size: 12px;
      color: #8a8580;
      font-weight: 500;
    }
    .key-info-value {
      font-size: 14px;
      color: #2C2C2B;
      line-height: 1.4;
    }
    .description {
      font-size: 15px;
      line-height: 1.7;
      color: #4a4a48;
      margin-bottom: 16px;
    }
    .source-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid #e8e4df;
      border-radius: 10px;
      margin-bottom: 8px;
      text-decoration: none;
      color: #4a4a48;
      font-size: 13px;
    }
    .source-link:hover { background: #f5f3f0; }
    .source-type {
      font-size: 9px;
      background: rgba(92,107,74,0.1);
      color: #5C6B4A;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .source-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .tag {
      font-size: 12px;
      color: #8a8580;
      background: #f0ede8;
      padding: 4px 10px;
      border-radius: 12px;
    }
    .cta {
      display: block;
      text-align: center;
      padding: 16px;
      background: #C4572A;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      margin: 24px 0;
    }
    .cta:hover { background: #a8471f; }
    .brand-footer {
      text-align: center;
      padding: 24px 20px;
      border-top: 1px solid #f0ede8;
    }
    .brand-footer .logo {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 700;
      color: #2C2C2B;
      letter-spacing: 2px;
    }
    .brand-footer .sub {
      font-family: 'Playfair Display', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: #8a8580;
      margin-top: 4px;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
      color: #8a8580;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">불러오는 중...</div>
  </div>

  <script>
    const PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.clpak.ipsomun';
    const SUPABASE_URL = 'https://zdvyzauugrpjqttsicve.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpkdnl6YXV1Z3JwanF0dHNpY3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTQ5MjAsImV4cCI6MjA5MDA5MDkyMH0.GDLhEvb8Nsf4n0-rrB1dM-EIsdUOWPOXAmY7azko2Zc';

    const CATEGORIES = {
      trending: '트렌딩', seasonal: '제철 음식', new_menu: '신메뉴',
      cvs: '편의점 신상', hotplace: '핫플레이스', recipe: '레시피', retro: '레트로'
    };

    function scoreLabel(s) {
      if (s >= 9) return '🔥 완전 핫';
      if (s >= 7) return '📈 뜨는 중';
      if (s >= 5) return '💡 관심 상승';
      if (s >= 3) return '➡️ 보통';
      return '📉 시들시들';
    }

    async function loadItem() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = PLAY_STORE; return; }

      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/trend_items?id=eq.${id}&select=*`,
          { headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}` } }
        );
        const data = await res.json();
        if (!data || data.length === 0) { window.location.href = PLAY_STORE; return; }
        render(data[0]);
      } catch (e) {
        window.location.href = PLAY_STORE;
      }
    }

    function render(item) {
      const title = item.food_name || item.headline || '입소문';
      const headline = item.headline || title;
      const desc = item.body_text || item.card_description || item.subtitle || '';
      const img = item.image_url || '';
      const cat = CATEGORIES[item.category] || '푸드 트렌드';
      const score = item.trend_score || 0;
      const tags = item.tags || [];
      const meta = item.metadata || {};
      const keyInfo = meta.key_info || [];
      const sourceUrls = meta.source_urls || [];
      const brand = item.brand;

      // Update page title & OG
      document.getElementById('page-title').textContent = `${title} - 입소문`;

      // Score dots
      const dots = Array.from({length: 10}, (_, i) =>
        `<div class="score-dot" style="background:${i < score ? '#C4572A' : '#e8e4df'}"></div>`
      ).join('');

      // Key info card
      const keyInfoHtml = keyInfo.length > 0
        ? `<div class="key-info">${keyInfo.filter(k => k.label && k.value).map(k =>
            `<div class="key-info-row"><span class="key-info-label">${k.label}</span><span class="key-info-value">${k.value}</span></div>`
          ).join('')}</div>`
        : '';

      // Source links
      const sourcesHtml = sourceUrls.length > 0
        ? sourceUrls.slice(0, 3).map(s => {
            const typeLabel = s.type === 'youtube' ? 'YouTube' : s.type === 'google_news' ? '뉴스' : '블로그';
            return `<a class="source-link" href="${s.url || '#'}" target="_blank"><span class="source-type">${typeLabel}</span><span class="source-title">${s.title || '원문 보기'}</span><span style="color:#C4572A">→</span></a>`;
          }).join('')
        : '';

      // Tags
      const tagsHtml = tags.length > 0
        ? `<div class="tags">${brand ? `<span class="tag" style="background:rgba(196,87,42,0.1);color:#C4572A;font-weight:600">${brand}</span>` : ''}${tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>`
        : '';

      document.getElementById('app').innerHTML = `
        <div class="hero">
          ${img ? `<img src="${img}" alt="${title}">` : ''}
          <div class="hero-overlay">
            <div class="category-badge">${cat}</div>
            <h1 class="hero-title">${headline}</h1>
          </div>
        </div>
        <div class="content">
          <div class="score-bar">
            <div class="score-number">${score}</div>
            <div>
              <div style="font-size:14px;font-weight:600;">입소문 지수</div>
              <div class="score-label">${scoreLabel(score)}</div>
              <div class="score-dots">${dots}</div>
            </div>
          </div>
          ${keyInfoHtml}
          ${desc ? `<p class="description">${desc}</p>` : ''}
          ${sourcesHtml}
          ${tagsHtml}
          <a class="cta" href="${PLAY_STORE}">입소문 앱에서 더 보기</a>
        </div>
        <div class="brand-footer">
          <div class="logo">입소문</div>
          <div class="sub">FOOD TREND MAGAZINE</div>
        </div>
      `;
    }

    loadItem();
  </script>
</body>
</html>
