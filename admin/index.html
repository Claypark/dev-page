<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>Push Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e1117;
      --bg-card: #161b22;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-hover: #484f58;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-bright: #f0f6fc;
      --accent: #238636;
      --accent-hover: #2ea043;
      --danger: #da3633;
      --danger-hover: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    #login-screen h1 {
      font-size: 28px;
      color: var(--text-bright);
    }

    #login-screen p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-decoration: none;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: #30363d; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-hover); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-ghost { background: none; color: var(--text-muted); padding: 6px 10px; }
    .btn-ghost:hover { color: var(--text); }

    /* App Layout */
    #app { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .topbar h1 { font-size: 16px; color: var(--text-bright); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 13px; color: var(--text-muted); }

    .nav {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      background: none;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-btn:hover { color: var(--text); background: #21262d; }
    .nav-btn.active { color: var(--text-bright); background: #21262d; }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Cards & Forms */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
    }

    textarea { resize: vertical; min-height: 60px; }
    select { cursor: pointer; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-success { background: rgba(35,134,54,0.2); color: #3fb950; }
    .badge-pending { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge-failed { background: rgba(218,54,51,0.2); color: var(--danger-hover); }
    .badge-cancelled { background: rgba(139,148,158,0.2); color: var(--text-muted); }

    /* Variant editor - locale groups */
    .locale-group {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .locale-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-input);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .locale-group-header:hover { background: var(--border); }

    .locale-group-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .locale-group-title .locale-flag {
      font-size: 16px;
    }

    .locale-group-title .locale-count {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      background: var(--border);
      padding: 1px 7px;
      border-radius: 10px;
    }

    .locale-group-body {
      padding: 10px 14px;
    }

    .locale-group-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .variant-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      position: relative;
    }

    .variant-item:last-child { margin-bottom: 0; }

    .variant-item .variant-num {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .variant-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 6px;
    }

    .variant-remove:hover { color: var(--danger-hover); }

    .btn-add-locale {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
    }

    .btn-add-locale:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,0.05);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .toast-success { background: var(--accent); color: #fff; }
    .toast-error { background: var(--danger); color: #fff; }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .loading { text-align: center; padding: 24px; color: var(--text-muted); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 20px;
    }

    /* App filter pills */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .pill {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover { border-color: var(--border-hover); color: var(--text); }
    .pill.active { background: #21262d; border-color: var(--blue); color: var(--text-bright); }

    @media (max-width: 600px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <h1>Push Admin</h1>
  <p>GitHub кі„м •мңјлЎң лЎңк·ёмқён•ҳм„ёмҡ”</p>
  <button class="btn btn-primary" onclick="loginWithGitHub()" id="login-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    GitHubлЎң лЎңк·ёмқё
  </button>
  <div id="login-error" style="color: var(--danger-hover); font-size: 13px; display: none;"></div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <h1>Push Admin</h1>
    <div class="topbar-right">
      <span class="topbar-user" id="user-display"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">лЎңк·ём•„мӣғ</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">лҢҖмӢңліҙл“ң</button>
    <button class="nav-btn" data-tab="send" onclick="switchTab('send')">мҰүмӢң м „мҶЎ</button>
    <button class="nav-btn" data-tab="schedules" onclick="switchTab('schedules')">мҠӨмјҖмӨ„</button>
    <button class="nav-btn" data-tab="events" onclick="switchTab('events')">мқҙлІӨнҠё к·ңм№ҷ</button>
    <button class="nav-btn" data-tab="apps" onclick="switchTab('apps')">м•ұ кҙҖлҰ¬</button>
  </div>

  <div class="main">
    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <div class="card-title">мөңк·ј м „мҶЎ мқҙл Ҙ</div>
        <div class="table-wrap" id="recent-logs-table"></div>
      </div>
    </div>

    <!-- Send Tab -->
    <div id="tab-send" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">мҰүмӢң н‘ёмӢң м „мҶЎ</div>
        <div class="form-row">
          <div class="form-group">
            <label>м•ұ м„ нғқ</label>
            <select id="send-app"></select>
          </div>
          <div class="form-group">
            <label>лҢҖмғҒ</label>
            <select id="send-target">
              <option value="all">м „мІҙ</option>
              <option value="ios">iOSл§Ң</option>
              <option value="android">Androidл§Ң</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>кё°ліё л©”мӢңм§Җ (л§Өм№ӯлҗҳлҠ” м–ём–ҙк°Җ м—Ҷмқ„ л•Ң)</label>
          <input type="text" id="send-title" placeholder="м ңлӘ©" style="margin-bottom:6px;">
          <textarea id="send-body" placeholder="ліёл¬ё"></textarea>
        </div>
        <div id="send-localized-list"></div>
        <button class="btn btn-secondary btn-sm" onclick="addSendLocale()" style="margin-bottom:12px;">+ м–ём–ҙлі„ л©”мӢңм§Җ м¶”к°Җ</button>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="sendImmediate()" id="send-btn">м „мҶЎн•ҳкё°</button>
        </div>
      </div>
    </div>

    <!-- Schedules Tab -->
    <div id="tab-schedules" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="schedule-filters"></div>
        <button class="btn btn-primary btn-sm" onclick="openScheduleModal()">+ мғҲ мҠӨмјҖмӨ„</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="schedules-table"></div>
      </div>
    </div>

    <!-- Events Tab -->
    <div id="tab-events" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="event-filters"></div>
        <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ мғҲ мқҙлІӨнҠё к·ңм№ҷ</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="events-table"></div>
      </div>
    </div>

    <!-- Apps Tab -->
    <div id="tab-apps" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="font-size:16px; color:var(--text-bright);">л“ұлЎқлҗң м•ұ</h2>
        <button class="btn btn-primary btn-sm" onclick="openAppModal()">+ мғҲ м•ұ л“ұлЎқ</button>
      </div>
      <div id="apps-list"></div>
    </div>
  </div>
</div>

<!-- Schedule Modal -->
<div id="schedule-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeScheduleModal()">
  <div class="modal">
    <div class="modal-title" id="schedule-modal-title">мғҲ мҠӨмјҖмӨ„</div>
    <input type="hidden" id="sched-edit-id">
    <div class="form-group">
      <label>м•ұ</label>
      <select id="sched-app"></select>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label>л°ҳліө</label>
        <select id="sched-repeat">
          <option value="">1нҡҢм„ұ</option>
          <option value="daily">л§Өмқј</option>
          <option value="weekly:mon,tue,wed,thu,fri">нҸүмқј л§Өмқј</option>
          <option value="weekly:sat,sun">мЈјл§җ</option>
          <option value="weekly:mon">л§ӨмЈј мӣ”</option>
          <option value="weekly:mon,wed,fri">л§ӨмЈј мӣ”мҲҳкёҲ</option>
          <option value="weekly:tue,thu">л§ӨмЈј нҷ”лӘ©</option>
        </select>
      </div>
      <div class="form-group" id="sched-time-group">
        <label>мҳҲм•Ҫ мӢңк°Ғ</label>
        <input type="datetime-local" id="sched-time">
      </div>
      <div class="form-group" id="sched-localtime-group" style="display:none;">
        <label>нҳ„м§Җ мӢңк°Ғ (HH:MM)</label>
        <input type="time" id="sched-local-hour">
      </div>
      <div class="form-group">
        <label>лҢҖмғҒ</label>
        <select id="sched-target">
          <option value="all">м „мІҙ</option>
          <option value="ios">iOSл§Ң</option>
          <option value="android">Androidл§Ң</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>мў…лЈҢмқј (м„ нғқ)</label>
      <input type="date" id="sched-until">
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;">
        <input type="checkbox" id="sched-local-time" onchange="toggleLocalTime()" style="width:auto;">
        мӮ¬мҡ©мһҗ нҳ„м§Җ мӢңк°„ кё°мӨҖмңјлЎң л°ңмҶЎ (мӢңк°„лҢҖлі„ мһҗлҸҷ л¶„л°°)
      </label>
    </div>

    <div style="margin-top:20px; margin-bottom:8px;">
      <label style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">
        лһңлҚӨ л¬ёкө¬ (м–ём–ҙлі„ к·ёлЈ№, м „мҶЎ мӢң н•ҙлӢ№ м–ём–ҙм—җм„ң н•ҳлӮҳлҘј лһңлҚӨ м„ нғқ)
      </label>
    </div>
    <div id="variants-container"></div>
    <div id="add-locale-area" style="margin-top:8px;"></div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeScheduleModal()">м·ЁмҶҢ</button>
      <button class="btn btn-primary" onclick="saveSchedule()" id="sched-save-btn">м ҖмһҘ</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div id="event-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEventModal()">
  <div class="modal">
    <div class="modal-title" id="event-modal-title">мғҲ мқҙлІӨнҠё к·ңм№ҷ</div>
    <input type="hidden" id="evt-edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>м•ұ</label>
        <select id="evt-app"></select>
      </div>
      <div class="form-group">
        <label>мқҙлІӨнҠё мқҙлҰ„</label>
        <input type="text" id="evt-name" placeholder="мҳҲ: reaction_received">
      </div>
    </div>
    <div class="form-group">
      <label>м ңлӘ© н…ңн”ҢлҰҝ</label>
      <input type="text" id="evt-title" placeholder="{{sender_name}}лӢҳмқҙ л°ҳмқ‘н–ҲмҠөлӢҲлӢӨ">
    </div>
    <div class="form-group">
      <label>ліёл¬ё н…ңн”ҢлҰҝ</label>
      <textarea id="evt-body" placeholder="{{content}}"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeEventModal()">м·ЁмҶҢ</button>
      <button class="btn btn-primary" onclick="saveEvent()" id="evt-save-btn">м ҖмһҘ</button>
    </div>
  </div>
</div>

<!-- App Modal -->
<div id="app-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAppModal()">

// в”Җв”Җв”Җ AUTH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

window.loginWithGitHub = async function() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'github',
    options: {
      redirectTo: window.location.origin + window.location.pathname,
    },
  });
  if (error) {
    document.getElementById('login-error').textContent = error.message;
    document.getElementById('login-error').style.display = 'block';
  }
};

window.logout = async function() {
  await supabase.auth.signOut();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

async function onLogin(session) {
  const user = session.user;
  const username = user.user_metadata?.user_name;

  // Check admin whitelist
  const { data: admin } = await supabase
    .from('admins')
    .select('id')
    .eq('github_username', username)
    .single();

  if (!admin) {
    document.getElementById('login-error').textContent = `"${username}" кі„м •мқҖ кҙҖлҰ¬мһҗ к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.`;
    document.getElementById('login-error').style.display = 'block';
    await supabase.auth.signOut();
    return;
  }

  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = `@${username}`;

  await loadApps();
  switchTab('dashboard');
}

// в”Җв”Җв”Җ DATA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadApps() {
  const { data } = await supabase.from('apps').select('id, name, app_key, app_secret');
  apps = data || [];
  populateAppSelects();
}

function populateAppSelects() {
  const selects = ['send-app', 'sched-app', 'evt-app'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = apps.map(a => `<option value="${a.id}" data-key="${a.app_key}" data-secret="${a.app_secret}">${a.name}</option>`).join('');
  });
}

async function apiCall(fnName, method, body, appId) {
  const app = apps.find(a => a.id === appId) || apps[0];
  if (!app) throw new Error('No app configured');

  const headers = {
    'Content-Type': 'application/json',
    'x-app-key': app.app_key,
    'x-app-secret': app.app_secret,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  };

  const opts = { method, headers };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);

  const resp = await fetch(`${FUNCTIONS_URL}/${fnName}`, opts);
  const result = await resp.json();

  if (!resp.ok) {
    throw new Error(result.message || `мҡ”мІӯ мӢӨнҢЁ (${resp.status})`);
  }

  return result;
}

// в”Җв”Җв”Җ TABS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');

  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'schedules') loadSchedules();
  else if (tab === 'events') loadEvents();
  else if (tab === 'apps') loadAppsTab();
};

// в”Җв”Җв”Җ DASHBOARD в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadDashboard() {
  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = '<div class="loading">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>';

  const [devicesRes, schedRes, logsRes] = await Promise.all([
    supabase.from('devices').select('id, app_id, platform, is_active'),
    supabase.from('push_schedules').select('id, status').eq('status', 'pending'),
    supabase.from('push_logs').select('id, app_id, title, body, status, sent_at, schedule_id')
      .order('sent_at', { ascending: false }).limit(20),
  ]);

  const devices = devicesRes.data || [];
  const activeDevices = devices.filter(d => d.is_active);
  const schedules = schedRes.data || [];
  const logs = logsRes.data || [];

  const iosCount = activeDevices.filter(d => d.platform === 'ios').length;
  const androidCount = activeDevices.filter(d => d.platform === 'android').length;

  statsGrid.innerHTML = `
    <div class="stat-card"><div class="stat-value">${activeDevices.length}</div><div class="stat-label">нҷңм„ұ л””л°”мқҙмҠӨ</div></div>
    <div class="stat-card"><div class="stat-value">${iosCount}</div><div class="stat-label">iOS</div></div>
    <div class="stat-card"><div class="stat-value">${androidCount}</div><div class="stat-label">Android</div></div>
    <div class="stat-card"><div class="stat-value">${schedules.length}</div><div class="stat-label">нҷңм„ұ мҠӨмјҖмӨ„</div></div>
  `;

  const logsTable = document.getElementById('recent-logs-table');

    logsTable.innerHTML = '<div class="empty-state">м „мҶЎ мқҙл Ҙмқҙ м—ҶмҠөлӢҲлӢӨ</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';

  logsTable.innerHTML = `
    <table>
      <thead><tr><th>мӢңк°Ғ</th><th>м•ұ</th><th>м ңлӘ©</th><th>мғҒнғң</th></tr></thead>

        ${logs.map(l => `

            <td style="white-space:nowrap;">${new Date(l.sent_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>

function collectSendLocalized() {
  const items = document.querySelectorAll('#send-localized-list .send-locale-item');
  const localized = {};
  items.forEach(el => {
    const locale = el.querySelector('.sl-locale').value;
    const title = el.querySelector('.sl-title').value.trim();
    const body = el.querySelector('.sl-body').value.trim();
    if (locale && (title || body)) {
      localized[locale] = { title, body };
    }
  });
  return Object.keys(localized).length > 0 ? localized : undefined;
}

window.sendImmediate = async function() {
  const appId = document.getElementById('send-app').value;
  const title = document.getElementById('send-title').value.trim();
  const body = document.getElementById('send-body').value.trim();
  const targetVal = document.getElementById('send-target').value;
  const localized = collectSendLocalized();

  if (!title || !body) { showToast('кё°ліё м ңлӘ©кіј ліёл¬ёмқ„ мһ…л Ҙн•ҳм„ёмҡ”', 'error'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = 'м „мҶЎ мӨ‘...';

  try {
    const target = targetVal === 'all'
      ? { type: 'all' }
      : { type: 'segment', value: targetVal };

    const payload = { title, body, target };
    if (localized) payload.localized = localized;

    const result = await apiCall('send-push', 'POST', payload, appId);
    if (result.sent > 0) {
      showToast(`м „мҶЎ мҷ„лЈҢ: ${result.sent}кұҙ м„ұкіө, ${result.failed ?? 0}кұҙ мӢӨнҢЁ`);
    } else if (result.sent === 0 && result.failed > 0) {
      showToast(`м „мҶЎ мӢӨнҢЁ: ${result.failed}кұҙ лӘЁл‘җ мӢӨнҢЁ`, 'error');
    } else {
      showToast('м „мҶЎ лҢҖмғҒ л””л°”мқҙмҠӨк°Җ м—ҶмҠөлӢҲлӢӨ', 'error');
    }
    document.getElementById('send-title').value = '';
    document.getElementById('send-body').value = '';
    document.getElementById('send-localized-list').innerHTML = '';
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'м „мҶЎн•ҳкё°';
  }
};

// в”Җв”Җв”Җ SCHEDULES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadSchedules() {
  const container = document.getElementById('schedules-table');
  container.innerHTML = '<div class="loading">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>';

  const { data } = await supabase
    .from('push_schedules')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(100);

  const schedules = data || [];

  if (schedules.length === 0) {
    container.innerHTML = '<div class="empty-state">л“ұлЎқлҗң мҠӨмјҖмӨ„мқҙ м—ҶмҠөлӢҲлӢӨ</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';
  const statusBadge = s => {
    const cls = s === 'pending' ? 'badge-pending' : s === 'sent' ? 'badge-success' : s === 'cancelled' ? 'badge-cancelled' : 'badge-failed';
    const label = s === 'pending' ? 'нҷңм„ұ' : s === 'sent' ? 'мҷ„лЈҢ' : s === 'cancelled' ? 'мӨ‘м§Җ' : s;
    return `<span class="badge ${cls}">${label}</span>`;
  };

  const repeatLabel = r => {
    if (!r) return '1нҡҢ';
    if (r === 'daily') return 'л§Өмқј';
    if (r.startsWith('weekly:')) return `л§ӨмЈј ${r.replace('weekly:','')}`;
    if (r.startsWith('monthly:')) return `л§Өмӣ” ${r.replace('monthly:','')}мқј`;
    return r;
  };

  const getTitle = s => {
    if (s.variants && s.variants.length > 0) return `${s.variants[0].title} мҷё ${s.variants.length - 1}к°ң`;
    return s.title || '-';
  };

  container.innerHTML = `
    <table>
      <thead><tr><th>м•ұ</th><th>л¬ёкө¬</th><th>л°ҳліө</th><th>лӢӨмқҢ мӢӨн–ү</th><th>мғҒнғң</th><th></th></tr></thead>
      <tbody>
        ${schedules.map(s => `
          <tr>
            <td>${getAppName(s.app_id)}</td>
            <td>${getTitle(s)}</td>
            <td>${repeatLabel(s.repeat_rule)}</td>
            <td style="white-space:nowrap;">${s.next_run_at ? new Date(s.next_run_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-'}</td>
            <td>${statusBadge(s.status)}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-ghost btn-sm" onclick="editSchedule('${s.id}')">нҺём§‘</button>
              ${s.status === 'pending'
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--yellow)" onclick="toggleSchedule('${s.id}','cancelled')">мӨ‘м§Җ</button>`
                : s.status === 'cancelled'
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--accent)" onclick="toggleSchedule('${s.id}','pending')">мһ¬нҷңм„ұ</button>`
                : ''
              }
              <button class="btn btn-ghost btn-sm" style="color:var(--danger-hover)" onclick="deleteSchedule('${s.id}')">мӮӯм ң</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

window.toggleLocalTime = function() {
  const checked = document.getElementById('sched-local-time').checked;
  document.getElementById('sched-time-group').style.display = checked ? 'none' : '';
  document.getElementById('sched-localtime-group').style.display = checked ? '' : 'none';
};

window.openScheduleModal = function(schedule) {
  document.getElementById('schedule-modal').style.display = 'flex';
  document.getElementById('sched-edit-id').value = schedule?.id || '';
  document.getElementById('schedule-modal-title').textContent = schedule ? 'мҠӨмјҖмӨ„ нҺём§‘' : 'мғҲ мҠӨмјҖмӨ„';

  if (schedule) {
    document.getElementById('sched-app').value = schedule.app_id;
    document.getElementById('sched-repeat').value = schedule.repeat_rule || '';
    document.getElementById('sched-target').value =
      schedule.target_type === 'segment' ? (schedule.target_value || 'all') : schedule.target_type;
    document.getElementById('sched-local-time').checked = !!schedule.use_local_time;
    if (schedule.use_local_time && schedule.local_hour != null) {
      const hh = String(schedule.local_hour).padStart(2, '0');
      const mm = String(schedule.local_minute ?? 0).padStart(2, '0');
      document.getElementById('sched-local-hour').value = `${hh}:${mm}`;
    }
    if (schedule.scheduled_at) {
      const d = new Date(schedule.scheduled_at);
      document.getElementById('sched-time').value = d.toISOString().slice(0, 16);
    }
    if (schedule.repeat_until) {
      document.getElementById('sched-until').value = schedule.repeat_until.slice(0, 10);
    }
    renderVariants(schedule.variants || [{ title: schedule.title || '', body: schedule.body || '' }]);
  } else {
    document.getElementById('sched-repeat').value = '';
    document.getElementById('sched-target').value = 'all';
    document.getElementById('sched-time').value = '';
    document.getElementById('sched-local-hour').value = '';
    document.getElementById('sched-until').value = '';
    document.getElementById('sched-local-time').checked = false;
    renderVariants([{ title: '', body: '' }]);
  }
  toggleLocalTime();
};

window.closeScheduleModal = function() {
  document.getElementById('schedule-modal').style.display = 'none';
};

const LOCALES = [
  { value: '', label: 'кё°ліё (м „мІҙ)', flag: 'рҹҢҗ' },
  { value: 'ko', label: 'н•ңкөӯм–ҙ', flag: 'рҹҮ°рҹҮ·' },
  { value: 'en', label: 'English', flag: 'рҹҮәрҹҮё' },
  { value: 'es', label: 'EspaГұol', flag: 'рҹҮӘрҹҮё' },
];

function getLocaleInfo(val) {
  return LOCALES.find(l => l.value === (val || '')) || LOCALES[0];
}

function groupVariantsByLocale(variants) {
  const groups = {};
  for (const v of variants) {
    const key = v.locale || '';
    if (!groups[key]) groups[key] = [];
    groups[key].push(v);
  }
  // Always ensure at least the default group exists
  if (!groups['']) groups[''] = [{ title: '', body: '', locale: null }];
  return groups;
}

function renderVariants(variants) {
  const container = document.getElementById('variants-container');
  const groups = groupVariantsByLocale(variants);
  const usedLocales = Object.keys(groups);

  container.innerHTML = usedLocales.map(localeKey => {
    const info = getLocaleInfo(localeKey);
    const items = groups[localeKey];
    const isDefault = localeKey === '';
    return `
      <div class="locale-group" data-locale="${localeKey}">
        <div class="locale-group-header">
          <div class="locale-group-title">
            <span class="locale-flag">${info.flag}</span>
            ${info.label}
            <span class="locale-count">${items.length}к°ң л¬ёкө¬</span>
          </div>
          <div class="locale-group-actions">
            <button class="btn btn-secondary btn-sm" onclick="addVariantToLocale('${localeKey}')" title="л¬ёкө¬ м¶”к°Җ" style="padding:2px 8px; font-size:11px;">+ м¶”к°Җ</button>
            ${!isDefault ? `<button class="variant-remove" onclick="removeLocaleGroup('${localeKey}')" title="мқҙ м–ём–ҙ к·ёлЈ№ мӮӯм ң">Г—</button>` : ''}
          </div>
        </div>
        <div class="locale-group-body">
          ${items.map((v, i) => `
            <div class="variant-item" data-locale="${localeKey}" data-idx="${i}">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <div class="variant-num">л¬ёкө¬ ${i + 1}</div>
                ${items.length > 1 || !isDefault ? `<button class="variant-remove" onclick="removeVariantFromLocale('${localeKey}', ${i})">Г—</button>` : ''}
              </div>
              <div class="form-group" style="margin-bottom:8px">
                <input type="text" class="var-title" value="${escapeHtml(v.title)}" placeholder="м ңлӘ©">
              </div>
              <div class="form-group" style="margin-bottom:0">
                <textarea class="var-body" rows="2" placeholder="ліёл¬ё">${escapeHtml(v.body)}</textarea>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Render "add locale" buttons for unused locales
  const unusedLocales = LOCALES.filter(l => l.value && !usedLocales.includes(l.value));
  const addArea = document.getElementById('add-locale-area');
  if (unusedLocales.length > 0) {
    addArea.innerHTML = `
      <button class="btn-add-locale" onclick="showLocaleMenu(this)">+ м–ём–ҙ м¶”к°Җ</button>
      <div id="locale-menu" style="display:none; margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;"></div>
    `;
  } else {
    addArea.innerHTML = '';
  }
}

window.showLocaleMenu = function(btn) {
  const groups = groupVariantsByLocale(collectVariants());
  const usedLocales = Object.keys(groups);
  const unusedLocales = LOCALES.filter(l => l.value && !usedLocales.includes(l.value));

  const menu = btn.nextElementSibling;
  if (menu.style.display === 'flex') {
    menu.style.display = 'none';
    return;
  }
  menu.style.display = 'flex';
  menu.innerHTML = unusedLocales.map(l =>
    `<button class="btn btn-secondary btn-sm" onclick="addLocaleGroup('${l.value}')" style="font-size:12px;">${l.flag} ${l.label}</button>`
  ).join('');
};

window.addLocaleGroup = function(locale) {
  const variants = collectVariants();
  variants.push({ title: '', body: '', locale: locale });
  renderVariants(variants);
};

window.removeLocaleGroup = function(locale) {
  const variants = collectVariants().filter(v => (v.locale || '') !== locale);
  renderVariants(variants);
};

window.addVariantToLocale = function(locale) {
  const variants = collectVariants();
  variants.push({ title: '', body: '', locale: locale || null });
  renderVariants(variants);
};

window.removeVariantFromLocale = function(locale, idx) {
  const variants = collectVariants();
  let count = 0;
  const removeIdx = variants.findIndex(v => {
    if ((v.locale || '') === locale) {
      if (count === idx) return true;
      count++;
    }
    return false;
  });
  if (removeIdx >= 0) variants.splice(removeIdx, 1);
  // If group becomes empty and it's default, keep at least one
  const remaining = variants.filter(v => (v.locale || '') === locale);
  if (locale === '' && remaining.length === 0) {
    variants.push({ title: '', body: '', locale: null });
  }
  renderVariants(variants);
};

function collectVariants() {
  const groups = document.querySelectorAll('#variants-container .locale-group');
  const variants = [];
  groups.forEach(group => {
    const locale = group.dataset.locale;
    group.querySelectorAll('.variant-item').forEach(el => {
      variants.push({
        title: el.querySelector('.var-title').value,
        body: el.querySelector('.var-body').value,
        locale: locale || null,
      });
    });
  });
  return variants;
}

window.saveSchedule = async function() {
  const editId = document.getElementById('sched-edit-id').value;
  const appId = document.getElementById('sched-app').value;
  const repeatRule = document.getElementById('sched-repeat').value || null;
  const scheduledAt = document.getElementById('sched-time').value;
  const targetVal = document.getElementById('sched-target').value;
  const untilVal = document.getElementById('sched-until').value;
  const useLocalTime = document.getElementById('sched-local-time').checked;
  const variants = collectVariants().filter(v => v.title || v.body);

  if (!useLocalTime && !scheduledAt) { showToast('мҳҲм•Ҫ мӢңк°Ғмқ„ мһ…л Ҙн•ҳм„ёмҡ”', 'error'); return; }
  if (variants.length === 0) { showToast('л¬ёкө¬лҘј н•ҳлӮҳ мқҙмғҒ мһ…л Ҙн•ҳм„ёмҡ”', 'error'); return; }

  const target = targetVal === 'all'
    ? { type: 'all' }
    : { type: 'segment', value: targetVal };

  const payload = {
    variants,
    title: variants[0]?.title,
    body: variants[0]?.body,
    target,
    scheduled_at: useLocalTime ? new Date().toISOString() : new Date(scheduledAt).toISOString(),
    repeat_rule: repeatRule,
    repeat_until: untilVal ? new Date(untilVal + 'T23:59:59').toISOString() : null,
    use_local_time: useLocalTime,
  };

  if (useLocalTime) {
    const localTimeVal = document.getElementById('sched-local-hour').value;
    if (!localTimeVal) { showToast('нҳ„м§Җ мӢңк°Ғмқ„ мһ…л Ҙн•ҳм„ёмҡ”', 'error'); return; }
    const [hh, mm] = localTimeVal.split(':').map(Number);
    payload.local_hour = hh;
    payload.local_minute = mm || 0;
  }

  const btn = document.getElementById('sched-save-btn');
  btn.disabled = true;

  try {
    if (editId) {
      await apiCall(`schedule-push?id=${editId}`, 'PATCH', payload, appId);
      showToast('мҠӨмјҖмӨ„мқҙ мҲҳм •лҗҳм—ҲмҠөлӢҲлӢӨ');
    } else {
      await apiCall('schedule-push', 'POST', payload, appId);
      showToast('мҠӨмјҖмӨ„мқҙ мғқм„ұлҗҳм—ҲмҠөлӢҲлӢӨ');
    }
    closeScheduleModal();
    loadSchedules();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

function generateKey(prefix, len) {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let result = prefix;
  for (let i = 0; i < len; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
}

window.saveApp = async function() {
  const editId = document.getElementById('app-edit-id').value;
  const name = document.getElementById('app-name').value.trim();
  const fcmProject = document.getElementById('app-fcm-project').value.trim();
  const fcmSaRaw = document.getElementById('app-fcm-sa').value.trim();

  if (!name) { showToast('м•ұ мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”', 'error'); return; }

  let fcmSa = null;
  if (fcmSaRaw) {
    try { fcmSa = JSON.parse(fcmSaRaw); } catch { showToast('FCM м„ңл№„мҠӨ кі„м • JSONмқҙ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ', 'error'); return; }
  }

  const btn = document.getElementById('app-save-btn');
  btn.disabled = true;

  try {
    if (editId) {
      const updates = { name, fcm_project_id: fcmProject || null };
      if (fcmSa) updates.fcm_service_account = fcmSa;
      const { error } = await supabase.from('apps').update(updates).eq('id', editId);
      if (error) { showToast('мҲҳм • мӢӨнҢЁ: ' + error.message, 'error'); return; }
      showToast('м•ұ м •ліҙк°Җ мҲҳм •лҗҳм—ҲмҠөлӢҲлӢӨ');
    } else {
      const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
      const appKey = slug + '-' + generateKey('', 8);
      const appSecret = generateKey('secret-', 32);
      const { error } = await supabase.from('apps').insert({
        app_key: appKey,
        app_secret: appSecret,
        name,
        fcm_project_id: fcmProject || null,
        fcm_service_account: fcmSa,
      });
      if (error) { showToast('л“ұлЎқ мӢӨнҢЁ: ' + error.message, 'error'); return; }
      showToast('м•ұмқҙ л“ұлЎқлҗҳм—ҲмҠөлӢҲлӢӨ');
    }
    closeAppModal();
    await loadApps();
    loadAppsTab();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escapeHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  }
})();

supabase.auth.onAuthStateChange(async (event, session) => {
  if (session && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED')) {
    await onLogin(session);
  }
  if (event === 'SIGNED_OUT') {
    currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }
});
</script>
