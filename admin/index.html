<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <title>Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0e1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 24px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 13px;
      color: #8b949e;
    }
    .card-grid {
      display: grid;
      gap: 12px;
    }
    a.card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    a.card:hover {
      border-color: #484f58;
      background: #1c2129;
    }
    .card-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: #8b949e;
      line-height: 1.5;
    }
    .card-arrow {
      color: #484f58;
      font-size: 18px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Admin</h1>
      <p>관리 도구</p>
    </div>
    <div class="card-grid">
      <a href="bamboo/" class="card">
        <div class="card-icon">🌿</div>
        <div class="card-body">
          <div class="card-title">대나무숲 관리</div>
          <div class="card-desc">AI 자동 글 생성, 수동 글 올리기, 자동 포스팅 설정</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
      <a href="push/" class="card">
        <div class="card-icon">🔔</div>
        <div class="card-body">
          <div class="card-title">푸시 알림 관리</div>
          <div class="card-desc">푸시 알림 발송, 예약, 기기 관리, 앱 설정</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
