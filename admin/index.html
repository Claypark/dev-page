<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e1117;
      --bg-card: #161b22;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-hover: #484f58;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-bright: #f0f6fc;
      --accent: #238636;
      --accent-hover: #2ea043;
      --danger: #da3633;
      --danger-hover: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    #login-screen h1 {
      font-size: 28px;
      color: var(--text-bright);
    }

    #login-screen p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-decoration: none;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: #30363d; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-hover); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-ghost { background: none; color: var(--text-muted); padding: 6px 10px; }
    .btn-ghost:hover { color: var(--text); }

    /* App Layout */
    #app { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .topbar h1 { font-size: 16px; color: var(--text-bright); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 13px; color: var(--text-muted); }

    .nav {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      background: none;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-btn:hover { color: var(--text); background: #21262d; }
    .nav-btn.active { color: var(--text-bright); background: #21262d; }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Cards & Forms */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
    }

    textarea { resize: vertical; min-height: 60px; }
    select { cursor: pointer; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-success { background: rgba(35,134,54,0.2); color: #3fb950; }
    .badge-pending { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge-failed { background: rgba(218,54,51,0.2); color: var(--danger-hover); }
    .badge-cancelled { background: rgba(139,148,158,0.2); color: var(--text-muted); }

    /* Variant editor */
    .variant-item {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      position: relative;
    }

    .variant-item .variant-num {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .variant-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 6px;
    }

    .variant-remove:hover { color: var(--danger-hover); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .toast-success { background: var(--accent); color: #fff; }
    .toast-error { background: var(--danger); color: #fff; }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .loading { text-align: center; padding: 24px; color: var(--text-muted); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 20px;
    }

    /* App filter pills */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .pill {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover { border-color: var(--border-hover); color: var(--text); }
    .pill.active { background: #21262d; border-color: var(--blue); color: var(--text-bright); }

    @media (max-width: 600px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <h1>Push Admin</h1>
  <p>GitHub 계정으로 로그인하세요</p>
  <button class="btn btn-primary" onclick="loginWithGitHub()" id="login-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    GitHub로 로그인
  </button>
  <div id="login-error" style="color: var(--danger-hover); font-size: 13px; display: none;"></div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <h1>Push Admin</h1>
    <div class="topbar-right">
      <span class="topbar-user" id="user-display"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">대시보드</button>
    <button class="nav-btn" data-tab="send" onclick="switchTab('send')">즉시 전송</button>
    <button class="nav-btn" data-tab="schedules" onclick="switchTab('schedules')">스케줄</button>
    <button class="nav-btn" data-tab="events" onclick="switchTab('events')">이벤트 규칙</button>
    <button class="nav-btn" data-tab="apps" onclick="switchTab('apps')">앱 관리</button>
  </div>

  <div class="main">
    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <div class="card-title">최근 전송 이력</div>
        <div class="table-wrap" id="recent-logs-table"></div>
      </div>
    </div>

    <!-- Send Tab -->
    <div id="tab-send" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">즉시 푸시 전송</div>
        <div class="form-group">
          <label>앱 선택</label>
          <select id="send-app"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>제목</label>
            <input type="text" id="send-title" placeholder="알림 제목">
          </div>
          <div class="form-group">
            <label>대상</label>
            <select id="send-target">
              <option value="all">전체</option>
              <option value="ios">iOS만</option>
              <option value="android">Android만</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>본문</label>
          <textarea id="send-body" placeholder="알림 내용"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="sendImmediate()" id="send-btn">전송하기</button>
        </div>
      </div>
    </div>

    <!-- Schedules Tab -->
    <div id="tab-schedules" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="schedule-filters"></div>
        <button class="btn btn-primary btn-sm" onclick="openScheduleModal()">+ 새 스케줄</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="schedules-table"></div>
      </div>
    </div>

    <!-- Events Tab -->
    <div id="tab-events" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="event-filters"></div>
        <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ 새 이벤트 규칙</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="events-table"></div>
      </div>
    </div>

    <!-- Apps Tab -->
    <div id="tab-apps" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="font-size:16px; color:var(--text-bright);">등록된 앱</h2>
        <button class="btn btn-primary btn-sm" onclick="openAppModal()">+ 새 앱 등록</button>
      </div>
      <div id="apps-list"></div>
    </div>
  </div>
</div>

<!-- Schedule Modal -->
<div id="schedule-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeScheduleModal()">
  <div class="modal">
    <div class="modal-title" id="schedule-modal-title">새 스케줄</div>
    <input type="hidden" id="sched-edit-id">
    <div class="form-group">
      <label>앱</label>
      <select id="sched-app"></select>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label>반복</label>
        <select id="sched-repeat">
          <option value="">1회성</option>
          <option value="daily">매일</option>
          <option value="weekly:mon,tue,wed,thu,fri">평일 매일</option>
          <option value="weekly:sat,sun">주말</option>
          <option value="weekly:mon">매주 월</option>
          <option value="weekly:mon,wed,fri">매주 월수금</option>
          <option value="weekly:tue,thu">매주 화목</option>
        </select>
      </div>
      <div class="form-group">
        <label>예약 시각</label>
        <input type="datetime-local" id="sched-time">
      </div>
      <div class="form-group">
        <label>대상</label>
        <select id="sched-target">
          <option value="all">전체</option>
          <option value="ios">iOS만</option>
          <option value="android">Android만</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>종료일 (선택)</label>
      <input type="date" id="sched-until">
    </div>

    <div style="margin-top:20px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
      <label style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">
        랜덤 문구 (전송 시 하나를 랜덤 선택)
      </label>
      <button class="btn btn-secondary btn-sm" onclick="addVariant()">+ 문구 추가</button>
    </div>
    <div id="variants-container"></div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeScheduleModal()">취소</button>
      <button class="btn btn-primary" onclick="saveSchedule()" id="sched-save-btn">저장</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div id="event-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEventModal()">
  <div class="modal">
    <div class="modal-title" id="event-modal-title">새 이벤트 규칙</div>
    <input type="hidden" id="evt-edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>앱</label>
        <select id="evt-app"></select>
      </div>
      <div class="form-group">
        <label>이벤트 이름</label>
        <input type="text" id="evt-name" placeholder="예: reaction_received">
      </div>
    </div>
    <div class="form-group">
      <label>제목 템플릿</label>
      <input type="text" id="evt-title" placeholder="{{sender_name}}님이 반응했습니다">
    </div>
    <div class="form-group">
      <label>본문 템플릿</label>
      <textarea id="evt-body" placeholder="{{content}}"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeEventModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvent()" id="evt-save-btn">저장</button>
    </div>
  </div>
</div>

<!-- App Modal -->
<div id="app-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAppModal()">
  <div class="modal">
    <div class="modal-title" id="app-modal-title">새 앱 등록</div>
    <input type="hidden" id="app-edit-id">
    <div class="form-group">
      <label>앱 이름</label>
      <input type="text" id="app-name" placeholder="예: AMEN, 대나무숲">
    </div>
    <div class="form-group">
      <label>FCM 프로젝트 ID</label>
      <input type="text" id="app-fcm-project" placeholder="Firebase 프로젝트 ID (나중에 입력 가능)">
    </div>
    <div class="form-group">
      <label>FCM 서비스 계정 JSON (나중에 입력 가능)</label>
      <textarea id="app-fcm-sa" rows="6" placeholder='Firebase Console > 프로젝트 설정 > 서비스 계정 > 새 비공개 키 생성 후 JSON 붙여넣기'></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeAppModal()">취소</button>
      <button class="btn btn-primary" onclick="saveApp()" id="app-save-btn">등록</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ─── CONFIG ───────────────────────────────────────────
// TODO: Replace with your actual Supabase project values
const SUPABASE_URL = 'https://nhroluokyjwdecsmpbwh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ocm9sdW9reWp3ZGVjc21wYndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDYyMTAsImV4cCI6MjA4ODY4MjIxMH0.aj200jMjwdK3bHLDBVL0b22AJhWd3rDl9XVcWkAbcYc';
const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`;

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── STATE ────────────────────────────────────────────
let currentUser = null;
let apps = [];
let currentTab = 'dashboard';

// ─── AUTH ─────────────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    await onLogin(session);
  }
}

window.loginWithGitHub = async function() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'github',
    options: {
      redirectTo: window.location.origin + window.location.pathname,
    },
  });
  if (error) {
    document.getElementById('login-error').textContent = error.message;
    document.getElementById('login-error').style.display = 'block';
  }
};

window.logout = async function() {
  await supabase.auth.signOut();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

async function onLogin(session) {
  const user = session.user;
  const username = user.user_metadata?.user_name;

  // Check admin whitelist
  const { data: admin } = await supabase
    .from('admins')
    .select('id')
    .eq('github_username', username)
    .single();

  if (!admin) {
    document.getElementById('login-error').textContent = `"${username}" 계정은 관리자 권한이 없습니다.`;
    document.getElementById('login-error').style.display = 'block';
    await supabase.auth.signOut();
    return;
  }

  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = `@${username}`;

  await loadApps();
  switchTab('dashboard');
}

// ─── DATA ─────────────────────────────────────────────
async function loadApps() {
  const { data } = await supabase.from('apps').select('id, name, app_key, app_secret');
  apps = data || [];
  populateAppSelects();
}

function populateAppSelects() {
  const selects = ['send-app', 'sched-app', 'evt-app'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = apps.map(a => `<option value="${a.id}" data-key="${a.app_key}" data-secret="${a.app_secret}">${a.name}</option>`).join('');
  });
}

async function apiCall(fnName, method, body, appId) {
  const app = apps.find(a => a.id === appId) || apps[0];
  if (!app) throw new Error('No app configured');

  const session = (await supabase.auth.getSession()).data.session;
  const headers = {
    'Content-Type': 'application/json',
    'x-app-key': app.app_key,
    'x-app-secret': app.app_secret,
    'Authorization': `Bearer ${session?.access_token}`,
  };

  const opts = { method, headers };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);

  const resp = await fetch(`${FUNCTIONS_URL}/${fnName}`, opts);
  return resp.json();
}

window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');

  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'schedules') loadSchedules();
  else if (tab === 'events') loadEvents();
  else if (tab === 'apps') loadAppsTab();
};

// ─── DASHBOARD ────────────────────────────────────────
async function loadDashboard() {
  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = '<div class="loading">불러오는 중...</div>';

  const [devicesRes, schedRes, logsRes] = await Promise.all([
    supabase.from('devices').select('id, app_id, platform, is_active'),
    supabase.from('push_schedules').select('id, status').eq('status', 'pending'),
    supabase.from('push_logs').select('id, app_id, title, body, status, sent_at, schedule_id')
      .order('sent_at', { ascending: false }).limit(20),
  ]);

  const devices = devicesRes.data || [];
  const activeDevices = devices.filter(d => d.is_active);
  const schedules = schedRes.data || [];
  const logs = logsRes.data || [];

  const iosCount = activeDevices.filter(d => d.platform === 'ios').length;
  const androidCount = activeDevices.filter(d => d.platform === 'android').length;

  statsGrid.innerHTML = `
    <div class="stat-card"><div class="stat-value">${activeDevices.length}</div><div class="stat-label">활성 디바이스</div></div>
    <div class="stat-card"><div class="stat-value">${iosCount}</div><div class="stat-label">iOS</div></div>
    <div class="stat-card"><div class="stat-value">${androidCount}</div><div class="stat-label">Android</div></div>
    <div class="stat-card"><div class="stat-value">${schedules.length}</div><div class="stat-label">활성 스케줄</div></div>

  const logsTable = document.getElementById('recent-logs-table');
  if (logs.length === 0) {
    logsTable.innerHTML = '<div class="empty-state">전송 이력이 없습니다</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';
  const badgeClass = s => s === 'success' ? 'badge-success' : s === 'invalid_token' ? 'badge-cancelled' : 'badge-failed';

  logsTable.innerHTML = `
    <table>
      <thead><tr><th>시각</th><th>앱</th><th>제목</th><th>상태</th></tr></thead>
      <tbody>
        ${logs.map(l => `
          <tr>
            <td style="white-space:nowrap;">${new Date(l.sent_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${getAppName(l.app_id)}</td>

      </tbody>

  `;
}

window.sendImmediate = async function() {

// ─── SCHEDULES ────────────────────────────────────────
async function loadSchedules() {
  const container = document.getElementById('schedules-table');
  container.innerHTML = '<div class="loading">불러오는 중...</div>';

  const { data } = await supabase
    .from('push_schedules')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(100);

  const schedules = data || [];

  if (schedules.length === 0) {
    container.innerHTML = '<div class="empty-state">등록된 스케줄이 없습니다</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';
  const statusBadge = s => {
    const cls = s === 'pending' ? 'badge-pending' : s === 'sent' ? 'badge-success' : s === 'cancelled' ? 'badge-cancelled' : 'badge-failed';
    const label = s === 'pending' ? '활성' : s === 'sent' ? '완료' : s === 'cancelled' ? '중지' : s;
    return `<span class="badge ${cls}">${label}</span>`;
  };

  const repeatLabel = r => {
    if (!r) return '1회';
    if (r === 'daily') return '매일';
    if (r.startsWith('weekly:')) return `매주 ${r.replace('weekly:','')}`;
    if (r.startsWith('monthly:')) return `매월 ${r.replace('monthly:','')}일`;
    return r;
  };

  const getTitle = s => {
    if (s.variants && s.variants.length > 0) return `${s.variants[0].title} 외 ${s.variants.length - 1}개`;
    return s.title || '-';
  };

  container.innerHTML = `
    <table>
      <thead><tr><th>앱</th><th>문구</th><th>반복</th><th>다음 실행</th><th>상태</th><th></th></tr></thead>
      <tbody>
        ${schedules.map(s => `
          <tr>
            <td>${getAppName(s.app_id)}</td>
            <td>${getTitle(s)}</td>
            <td>${repeatLabel(s.repeat_rule)}</td>
            <td style="white-space:nowrap;">${s.next_run_at ? new Date(s.next_run_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-'}</td>
            <td>${statusBadge(s.status)}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-ghost btn-sm" onclick="editSchedule('${s.id}')">편집</button>
              ${s.status === 'pending'
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--yellow)" onclick="toggleSchedule('${s.id}','cancelled')">중지</button>`
                : s.status === 'cancelled'
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--accent)" onclick="toggleSchedule('${s.id}','pending')">재활성</button>`
                : ''
              }
              <button class="btn btn-ghost btn-sm" style="color:var(--danger-hover)" onclick="deleteSchedule('${s.id}')">삭제</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

window.openScheduleModal = function(schedule) {
  document.getElementById('schedule-modal').style.display = 'flex';
  document.getElementById('sched-edit-id').value = schedule?.id || '';
  document.getElementById('schedule-modal-title').textContent = schedule ? '스케줄 편집' : '새 스케줄';

  if (schedule) {
    document.getElementById('sched-app').value = schedule.app_id;
    document.getElementById('sched-repeat').value = schedule.repeat_rule || '';
    document.getElementById('sched-target').value =
      schedule.target_type === 'segment' ? (schedule.target_value || 'all') : schedule.target_type;
    if (schedule.scheduled_at) {
      const d = new Date(schedule.scheduled_at);
      document.getElementById('sched-time').value = d.toISOString().slice(0, 16);
    }
    if (schedule.repeat_until) {
      document.getElementById('sched-until').value = schedule.repeat_until.slice(0, 10);
    }
    renderVariants(schedule.variants || [{ title: schedule.title || '', body: schedule.body || '' }]);
  } else {
    document.getElementById('sched-repeat').value = '';
    document.getElementById('sched-target').value = 'all';
    document.getElementById('sched-time').value = '';
    document.getElementById('sched-until').value = '';
    renderVariants([{ title: '', body: '' }]);
  }
};

window.closeScheduleModal = function() {
  document.getElementById('schedule-modal').style.display = 'none';
};

function renderVariants(variants) {
  const container = document.getElementById('variants-container');
  container.innerHTML = variants.map((v, i) => `
    <div class="variant-item" data-idx="${i}">
      <div class="variant-num">문구 ${i + 1}</div>
      ${variants.length > 1 ? `<button class="variant-remove" onclick="removeVariant(${i})">×</button>` : ''}
      <div class="form-group" style="margin-bottom:8px">
        <input type="text" class="var-title" value="${escapeHtml(v.title)}" placeholder="제목">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <textarea class="var-body" rows="2" placeholder="본문">${escapeHtml(v.body)}</textarea>
      </div>
    </div>
  `).join('');
}

window.addVariant = function() {
  const variants = collectVariants();
  variants.push({ title: '', body: '' });
  renderVariants(variants);
};

window.removeVariant = function(idx) {
  const variants = collectVariants();
  variants.splice(idx, 1);
  renderVariants(variants);
};

function collectVariants() {
  const items = document.querySelectorAll('#variants-container .variant-item');
  return Array.from(items).map(el => ({
    title: el.querySelector('.var-title').value,
    body: el.querySelector('.var-body').value,
  }));
}

window.saveSchedule = async function() {
  const editId = document.getElementById('sched-edit-id').value;
  const appId = document.getElementById('sched-app').value;
  const repeatRule = document.getElementById('sched-repeat').value || null;
  const scheduledAt = document.getElementById('sched-time').value;
  const targetVal = document.getElementById('sched-target').value;
  const untilVal = document.getElementById('sched-until').value;
  const variants = collectVariants().filter(v => v.title || v.body);

  if (!scheduledAt) { showToast('예약 시각을 입력하세요', 'error'); return; }
  if (variants.length === 0) { showToast('문구를 하나 이상 입력하세요', 'error'); return; }

  const target = targetVal === 'all'
    ? { type: 'all' }
    : { type: 'segment', value: targetVal };

  const payload = {
    variants,
    title: variants[0]?.title,
    body: variants[0]?.body,
    target,
    scheduled_at: new Date(scheduledAt).toISOString(),
    repeat_rule: repeatRule,
    repeat_until: untilVal ? new Date(untilVal + 'T23:59:59').toISOString() : null,
  };

  const btn = document.getElementById('sched-save-btn');
  btn.disabled = true;

  try {
    if (editId) {
      await apiCall(`schedule-push?id=${editId}`, 'PATCH', payload, appId);
      showToast('스케줄이 수정되었습니다');
    } else {
      await apiCall('schedule-push', 'POST', payload, appId);
      showToast('스케줄이 생성되었습니다');
    }
    closeScheduleModal();
    loadSchedules();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

window.editSchedule = async function(id) {
  const { data } = await supabase.from('push_schedules').select('*').eq('id', id).single();
  if (data) openScheduleModal(data);
};

window.toggleSchedule = async function(id, newStatus) {
  const schedule = (await supabase.from('push_schedules').select('app_id').eq('id', id).single()).data;
  if (!schedule) return;
  await apiCall(`schedule-push?id=${id}`, 'PATCH', { status: newStatus }, schedule.app_id);
  showToast(newStatus === 'cancelled' ? '스케줄이 중지되었습니다' : '스케줄이 재활성화되었습니다');
  loadSchedules();
};

window.deleteSchedule = async function(id) {
  if (!confirm('이 스케줄을 삭제하시겠습니까?')) return;
  const schedule = (await supabase.from('push_schedules').select('app_id').eq('id', id).single()).data;
  if (!schedule) return;
  await apiCall(`schedule-push?id=${id}`, 'DELETE', null, schedule.app_id);
  showToast('스케줄이 삭제되었습니다');
  loadSchedules();
};

function generateKey(prefix, len) {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let result = prefix;
  for (let i = 0; i < len; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
}

window.openAppModal = function(app) {
  document.getElementById('app-modal').style.display = 'flex';
  document.getElementById('app-edit-id').value = app?.id || '';
  document.getElementById('app-modal-title').textContent = app ? '앱 편집' : '새 앱 등록';
  document.getElementById('app-save-btn').textContent = app ? '저장' : '등록';

  document.getElementById('app-name').value = app?.name || '';
  document.getElementById('app-fcm-project').value = app?.fcm_project_id || '';
  document.getElementById('app-fcm-sa').value = app?.fcm_service_account ? JSON.stringify(app.fcm_service_account, null, 2) : '';
};

window.closeAppModal = function() {
  document.getElementById('app-modal').style.display = 'none';
};

window.saveApp = async function() {
  const editId = document.getElementById('app-edit-id').value;
  const name = document.getElementById('app-name').value.trim();
  const fcmProject = document.getElementById('app-fcm-project').value.trim();
  const fcmSaRaw = document.getElementById('app-fcm-sa').value.trim();

  if (!name) { showToast('앱 이름을 입력하세요', 'error'); return; }

  let fcmSa = null;
  if (fcmSaRaw) {
    try { fcmSa = JSON.parse(fcmSaRaw); } catch { showToast('FCM 서비스 계정 JSON이 올바르지 않습니다', 'error'); return; }
  }

  const btn = document.getElementById('app-save-btn');
  btn.disabled = true;

  try {
    if (editId) {
      const updates = { name, fcm_project_id: fcmProject || null };
      if (fcmSa) updates.fcm_service_account = fcmSa;
      await supabase.from('apps').update(updates).eq('id', editId);
      showToast('앱 정보가 수정되었습니다');
    } else {
      const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
      const appKey = slug + '-' + generateKey('', 8);
      const appSecret = generateKey('secret-', 32);
      await supabase.from('apps').insert({
        app_key: appKey,
        app_secret: appSecret,
        name,
        fcm_project_id: fcmProject || null,
        fcm_service_account: fcmSa,
      });
      showToast('앱이 등록되었습니다');
    }
    closeAppModal();
    await loadApps();
    loadAppsTab();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

window.editApp = async function(id) {

  if (data) openAppModal(data);
};

window.deleteApp = async function(id, name) {
  if (!confirm(`"${name}" 앱을 삭제하시겠습니까? 관련된 디바이스, 스케줄, 로그가 모두 삭제됩니다.`)) return;
  await supabase.from('apps').delete().eq('id', id);
  showToast('앱이 삭제되었습니다');
  await loadApps();
  loadAppsTab();
};

// ─── UTILS ────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escapeHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── INIT ─────────────────────────────────────────────
checkSession();

// Handle OAuth callback
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    await onLogin(session);
  }
});
</script>
