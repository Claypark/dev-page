<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>Push Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e1117;
      --bg-card: #161b22;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-hover: #484f58;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-bright: #f0f6fc;
      --accent: #238636;
      --accent-hover: #2ea043;
      --danger: #da3633;
      --danger-hover: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Loading Screen */
    #loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Login Screen */
    #login-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    #login-screen h1 {
      font-size: 28px;
      color: var(--text-bright);
    }

    #login-screen p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-decoration: none;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { background: #30363d; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--danger-hover); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-ghost { background: none; color: var(--text-muted); padding: 6px 10px; }
    .btn-ghost:hover { color: var(--text); }

    /* App Layout */
    #app { display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .topbar h1 { font-size: 16px; color: var(--text-bright); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 13px; color: var(--text-muted); }

    .nav {
      display: flex;
      gap: 4px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      background: none;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-btn:hover { color: var(--text); background: #21262d; }
    .nav-btn.active { color: var(--text-bright); background: #21262d; }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Cards & Forms */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
    }

    textarea { resize: vertical; min-height: 60px; }
    select { cursor: pointer; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .stat-card:hover {
      border-color: var(--border-hover);
      background: #1c2129;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-success { background: rgba(35,134,54,0.2); color: #3fb950; }
    .badge-pending { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge-failed { background: rgba(218,54,51,0.2); color: var(--danger-hover); }
    .badge-cancelled { background: rgba(139,148,158,0.2); color: var(--text-muted); }

    /* Variant editor - locale groups */
    .locale-group {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .locale-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-input);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .locale-group-header:hover { background: var(--border); }

    .locale-group-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .locale-group-title .locale-flag {
      font-size: 16px;
    }

    .locale-group-title .locale-count {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      background: var(--border);
      padding: 1px 7px;
      border-radius: 10px;
    }

    .locale-group-body {
      padding: 10px 14px;
    }

    .locale-group-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .variant-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      position: relative;
    }

    .variant-item:last-child { margin-bottom: 0; }

    .variant-item .variant-num {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .variant-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 6px;
    }

    .variant-remove:hover { color: var(--danger-hover); }

    .btn-add-locale {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
    }

    .btn-add-locale:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,0.05);
    }

    /* Bulk input modal */
    .bulk-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .bulk-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 540px;
      max-width: 95vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .bulk-modal textarea {
      width: 100%;
      min-height: 280px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 12px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      line-height: 1.6;
      resize: vertical;
    }
    .bulk-modal textarea:focus {
      outline: none;
      border-color: var(--blue);
    }
    .bulk-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    .bulk-preview {
      margin-top: 12px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 12px;
      color: var(--text-muted);
    }
    .bulk-preview-item {
      padding: 6px 10px;
      border-left: 2px solid var(--accent);
      margin-bottom: 4px;
      background: var(--bg-input);
      border-radius: 0 4px 4px 0;
    }
    .bulk-preview-item .bp-title {
      color: var(--text);
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .toast-success { background: var(--accent); color: #fff; }
    .toast-error { background: var(--danger); color: #fff; }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .loading { text-align: center; padding: 24px; color: var(--text-muted); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 20px;
    }

    /* App filter pills */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .pill {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .pill:hover { border-color: var(--border-hover); color: var(--text); }
    .pill.active { background: #21262d; border-color: var(--blue); color: var(--text-bright); }

    .token-cell {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      cursor: pointer;
    }

    .token-cell:hover { color: var(--blue); }

    .device-row-inactive td { opacity: 0.45; }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .platform-ios { background: rgba(88,166,255,0.15); color: var(--blue); }
    .platform-android { background: rgba(63,185,80,0.15); color: #3fb950; }

    @media (max-width: 768px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }

      .topbar { padding: 10px 12px; }
      .topbar h1 { font-size: 14px; }

      .nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding: 8px 12px;
        gap: 2px;
      }
      .nav::-webkit-scrollbar { display: none; }
      .nav-btn { white-space: nowrap; padding: 6px 12px; font-size: 12px; }

      .main { padding: 12px; }
      .card { padding: 14px; }

      .modal { width: 96%; padding: 16px; max-height: 90vh; }
      .bulk-modal { width: 96%; padding: 16px; }

      table { font-size: 12px; }
      th, td { padding: 8px 6px; }
      .token-cell { max-width: 120px; font-size: 10px; }

      .form-actions { flex-direction: column; }
      .form-actions .btn { width: 100%; justify-content: center; }

      .filter-bar { margin-bottom: 8px; }

      .stat-card { padding: 10px 12px; }
      .stat-value { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">로딩 중...</div>

<!-- Login Screen -->
<div id="login-screen">
  <h1>Push Admin</h1>
  <p>GitHub 계정으로 로그인하세요</p>
  <button class="btn btn-primary" onclick="loginWithGitHub()" id="login-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    GitHub로 로그인
  </button>
  <div id="login-error" style="color: var(--danger-hover); font-size: 13px; display: none;"></div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <h1>Push Admin</h1>
    <div class="topbar-right">
      <span class="topbar-user" id="user-display"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">대시보드</button>
    <button class="nav-btn" data-tab="send" onclick="switchTab('send')">즉시 전송</button>
    <button class="nav-btn" data-tab="devices" onclick="switchTab('devices')">디바이스</button>
    <button class="nav-btn" data-tab="schedules" onclick="switchTab('schedules')">스케줄</button>
    <button class="nav-btn" data-tab="events" onclick="switchTab('events')">이벤트 규칙</button>
    <button class="nav-btn" data-tab="apps" onclick="switchTab('apps')">앱 관리</button>
  </div>

  <div class="main">
    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <div class="card-title">최근 전송 이력</div>
        <div class="table-wrap" id="recent-logs-table"></div>
      </div>
    </div>

    <!-- Send Tab -->
    <div id="tab-send" class="tab-content" style="display:none;">
      <div class="card">
        <div class="card-title">즉시 푸시 전송</div>
        <div class="form-row">
          <div class="form-group">
            <label>앱 선택</label>
            <select id="send-app"></select>
          </div>
          <div class="form-group">
            <label>대상</label>
            <select id="send-target" onchange="toggleDeviceTokenInput()">
              <option value="all">전체</option>
              <option value="ios">iOS만</option>
              <option value="android">Android만</option>
              <option value="device">특정 디바이스</option>
            </select>
          </div>
        </div>
        <div class="form-group" id="send-device-token-group" style="display:none;">
          <label>디바이스 토큰</label>
          <input type="text" id="send-device-token" placeholder="FCM 토큰을 입력하거나 디바이스 탭에서 선택하세요">
        </div>
        <div class="form-group">
          <label>기본 메시지 (매칭되는 언어가 없을 때)</label>
          <input type="text" id="send-title" placeholder="제목" style="margin-bottom:6px;">
          <textarea id="send-body" placeholder="본문"></textarea>
        </div>
        <div id="send-localized-list"></div>
        <button class="btn btn-secondary btn-sm" onclick="addSendLocale()" style="margin-bottom:12px;">+ 언어별 메시지 추가</button>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="sendImmediate()" id="send-btn">전송하기</button>
        </div>
      </div>
    </div>

    <!-- Devices Tab -->
    <div id="tab-devices" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="device-filters"></div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="cleanupStaleDevices()" id="cleanup-btn">무효 토큰 정리</button>
        </div>
      </div>
      <div class="stats-grid" id="device-stats"></div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="devices-table"></div>
      </div>
    </div>

    <!-- Schedules Tab -->
    <div id="tab-schedules" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="schedule-filters"></div>
        <button class="btn btn-primary btn-sm" onclick="openScheduleModal()">+ 새 스케줄</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="schedules-table"></div>
      </div>
    </div>

    <!-- Events Tab -->
    <div id="tab-events" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="filter-bar" id="event-filters"></div>
        <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ 새 이벤트 규칙</button>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="events-table"></div>
      </div>
    </div>

    <!-- Apps Tab -->
    <div id="tab-apps" class="tab-content" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="font-size:16px; color:var(--text-bright);">등록된 앱</h2>
        <button class="btn btn-primary btn-sm" onclick="openAppModal()">+ 새 앱 등록</button>
      </div>
      <div id="apps-list"></div>
    </div>
  </div>
</div>

<!-- Schedule Modal -->
<div id="schedule-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeScheduleModal()">
  <div class="modal">
    <div class="modal-title" id="schedule-modal-title">새 스케줄</div>
    <input type="hidden" id="sched-edit-id">
    <div class="form-group">
      <label>앱</label>
      <select id="sched-app"></select>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label>반복</label>
        <select id="sched-repeat">
          <option value="">1회성</option>
          <option value="daily">매일</option>
          <option value="weekly:mon,tue,wed,thu,fri">평일 매일</option>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ─── CONFIG ───────────────────────────────────────────
// TODO: Replace with your actual Supabase project values
const SUPABASE_URL = 'https://nhroluokyjwdecsmpbwh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ocm9sdW9reWp3ZGVjc21wYndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDYyMTAsImV4cCI6MjA4ODY4MjIxMH0.aj200jMjwdK3bHLDBVL0b22AJhWd3rDl9XVcWkAbcYc';
const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`;

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    detectSessionInUrl: true,
    autoRefreshToken: true,
    storageKey: 'push-admin-auth',
  },
});

// ─── STATE ────────────────────────────────────────────
let currentUser = null;
let apps = [];
let currentTab = 'dashboard';

// ─── AUTH ─────────────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    await onLogin(session);
  }
}

window.loginWithGitHub = async function() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'github',
    options: {
      redirectTo: window.location.origin + window.location.pathname,
    },
  });
  if (error) {
    document.getElementById('login-error').textContent = error.message;
    document.getElementById('login-error').style.display = 'block';
  }
};

window.logout = async function() {
  await supabase.auth.signOut();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

async function onLogin(session) {
  const user = session.user;
  const username = user.user_metadata?.user_name;

  // Check admin whitelist
  const { data: admin } = await supabase
    .from('admins')
    .select('id')
    .eq('github_username', username)
    .single();

  if (!admin) {
    document.getElementById('login-error').textContent = `"${username}" 계정은 관리자 권한이 없습니다.`;
    document.getElementById('login-error').style.display = 'block';
    await supabase.auth.signOut();
    showLoginScreen();
    return;
  }

  currentUser = user;
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = `@${username}`;

  await loadApps();
  switchTab('dashboard');
}

// ─── DATA ─────────────────────────────────────────────
async function loadApps() {
  const { data } = await supabase.from('apps').select('id, name, app_key, app_secret');
  apps = data || [];
  populateAppSelects();
}

function populateAppSelects() {
  const selects = ['send-app', 'sched-app', 'evt-app'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = apps.map(a => `<option value="${a.id}" data-key="${a.app_key}" data-secret="${a.app_secret}">${a.name}</option>`).join('');
  });
}

async function apiCall(fnName, method, body, appId) {
  const app = apps.find(a => a.id === appId) || apps[0];
  if (!app) throw new Error('No app configured');

  const headers = {
    'Content-Type': 'application/json',
    'x-app-key': app.app_key,
    'x-app-secret': app.app_secret,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  };

  const opts = { method, headers, signal: AbortSignal.timeout(30000) };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);

  let resp;
  try {
    resp = await fetch(`${FUNCTIONS_URL}/${fnName}`, opts);
  } catch (e) {
    if (e.name === 'TimeoutError' || e.name === 'AbortError') {
      throw new Error('서버 응답이 너무 오래 걸립니다. 잠시 후 다시 시도해주세요.');
    }
    throw new Error('네트워크 오류가 발생했습니다.');
  }

  const result = await resp.json();

  if (!resp.ok) {
    throw new Error(result.message || `요청 실패 (${resp.status})`);
  }

  return result;
}

// ─── TABS ─────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');

  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'devices') loadDevices();
  else if (tab === 'schedules') loadSchedules();
  else if (tab === 'events') loadEvents();
  else if (tab === 'apps') loadAppsTab();
};

// ─── DASHBOARD ────────────────────────────────────────
async function loadDashboard() {
  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = '<div class="loading">불러오는 중...</div>';

  const [devicesRes, schedRes, logsRes, allSchedsRes] = await Promise.all([
    supabase.from('devices').select('id, app_id, platform, is_active, is_subscribed'),
    supabase.from('push_schedules').select('id, status').eq('status', 'pending'),
    supabase.from('push_logs').select('id, app_id, title, body, status, sent_at, schedule_id, error_message')
      .order('sent_at', { ascending: false }).limit(50),
    supabase.from('push_schedules').select('id, title, variants, repeat_rule'),
  ]);

  const devices = devicesRes.data || [];
  const activeDevices = devices.filter(d => d.is_active);
  const subscribedDevices = devices.filter(d => d.is_active && d.is_subscribed !== false);
  const schedules = schedRes.data || [];
  const logs = logsRes.data || [];
  const allScheds = allSchedsRes.data || [];

  const iosCount = subscribedDevices.filter(d => d.platform === 'ios').length;
  const androidCount = subscribedDevices.filter(d => d.platform === 'android').length;

  statsGrid.innerHTML = `
    <div class="stat-card" onclick="switchTab('devices')"><div class="stat-value">${subscribedDevices.length}</div><div class="stat-label">전송 가능 디바이스</div></div>
    <div class="stat-card" onclick="switchTab('devices')"><div class="stat-value">${iosCount} / ${androidCount}</div><div class="stat-label">iOS / Android</div></div>
    <div class="stat-card" onclick="switchTab('schedules')"><div class="stat-value">${schedules.length}</div><div class="stat-label">활성 스케줄</div></div>
    <div class="stat-card" onclick="switchTab('send')"><div class="stat-value">→</div><div class="stat-label">즉시 전송</div></div>
  `;

  const logsTable = document.getElementById('recent-logs-table');
  if (logs.length === 0) {
    logsTable.innerHTML = '<div class="empty-state">전송 이력이 없습니다</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';
  const badgeClass = s => s === 'success' ? 'badge-success' : s === 'invalid_token' ? 'badge-cancelled' : 'badge-failed';
  const getSchedLabel = id => {
    if (!id) return '';
    const s = allScheds.find(x => x.id === id);
    if (!s) return '<span class="badge badge-pending">스케줄</span>';
    const name = s.title || (s.variants?.[0]?.title) || '스케줄';
    const short = name.length > 12 ? name.substring(0, 12) + '…' : name;
    return `<span class="badge badge-pending" title="${escapeHtml(name)}">${escapeHtml(short)}</span>`;
  };

  logsTable.innerHTML = `
    <table>
      <thead><tr><th>시각</th><th>앱</th><th>구분</th><th>제목</th><th>상태</th><th>에러</th></tr></thead>
      <tbody>
        ${logs.map(l => `
          <tr>
            <td style="white-space:nowrap;">${new Date(l.sent_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${getAppName(l.app_id)}</td>
            <td>${l.schedule_id ? getSchedLabel(l.schedule_id) : '<span style="font-size:11px;color:var(--text-muted);">즉시</span>'}</td>
            <td>${l.title || '-'}</td>
            <td><span class="badge ${badgeClass(l.status)}">${l.status}</span></td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--text-muted);" title="${escapeHtml(l.error_message || '')}">${l.error_message ? escapeHtml(l.error_message).substring(0, 40) : '-'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ─── DEVICES ──────────────────────────────────────────
let deviceFilter = 'all'; // 'all' | 'active' | 'inactive'
let deviceAppFilter = null;

async function loadDevices() {
  const container = document.getElementById('devices-table');
  const statsContainer = document.getElementById('device-stats');
  container.innerHTML = '<div class="loading">불러오는 중...</div>';

  const { data, error } = await supabase
    .from('devices')
    .select('id, device_token, platform, is_active, is_subscribed, user_id, locale, timezone, app_id, created_at, updated_at')
    .order('updated_at', { ascending: false });

  if (error) {
    container.innerHTML = `<div class="empty-state">불러오기 실패: ${error.message}</div>`;
    return;
  }

  const devices = data || [];

  const totalCount = devices.length;
  const activeCount = devices.filter(d => d.is_active).length;
  const inactiveCount = totalCount - activeCount;
  const iosCount = devices.filter(d => d.is_active && d.platform === 'ios').length;
  const androidCount = devices.filter(d => d.is_active && d.platform === 'android').length;

  statsContainer.innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalCount}</div><div class="stat-label">전체 레코드</div></div>
    <div class="stat-card"><div class="stat-value">${activeCount}</div><div class="stat-label">활성</div></div>
    <div class="stat-card"><div class="stat-value">${inactiveCount}</div><div class="stat-label">비활성</div></div>
    <div class="stat-card"><div class="stat-value">${iosCount} / ${androidCount}</div><div class="stat-label">iOS / Android (활성)</div></div>
  `;

  // Filter bar
  const filterBar = document.getElementById('device-filters');
  filterBar.innerHTML = `
    <label>상태:</label>
    <button class="pill ${deviceFilter === 'all' ? 'active' : ''}" onclick="setDeviceFilter('all')">전체 (${totalCount})</button>
    <button class="pill ${deviceFilter === 'active' ? 'active' : ''}" onclick="setDeviceFilter('active')">활성 (${activeCount})</button>
    <button class="pill ${deviceFilter === 'inactive' ? 'active' : ''}" onclick="setDeviceFilter('inactive')">비활성 (${inactiveCount})</button>
  `;

  let filtered = devices;
  if (deviceFilter === 'active') filtered = devices.filter(d => d.is_active);
  else if (deviceFilter === 'inactive') filtered = devices.filter(d => !d.is_active);
  if (deviceAppFilter) filtered = filtered.filter(d => d.app_id === deviceAppFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">등록된 디바이스가 없습니다</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';
  const shortToken = t => t ? t.substring(0, 20) + '…' + t.substring(t.length - 8) : '-';
  const safeAttr = s => (s || '').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  const timeSince = d => {
    if (!d) return '-';
    const diff = Date.now() - new Date(d).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}분 전`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}시간 전`;
    const days = Math.floor(hours / 24);
    if (days < 30) return `${days}일 전`;
    return new Date(d).toLocaleDateString('ko-KR');
  };

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>상태</th>
          <th>플랫폼</th>
          <th>토큰</th>
          <th>앱</th>
          <th>언어</th>
          <th>시간대</th>
          <th>마지막 등록</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(d => `
          <tr class="${d.is_active ? '' : 'device-row-inactive'}">
            <td>
              <span class="badge ${d.is_active ? 'badge-success' : 'badge-cancelled'}">${d.is_active ? '활성' : '비활성'}</span>
              ${d.is_subscribed === false ? '<span class="badge badge-pending" style="margin-left:4px;">수신거부</span>' : ''}
            </td>
            <td><span class="platform-badge platform-${d.platform}">${d.platform === 'ios' ? '🍎 iOS' : '🤖 Android'}</span></td>
            <td class="token-cell" title="${safeAttr(d.device_token)}" onclick="copyToken('${safeAttr(d.device_token)}')">${shortToken(d.device_token)}</td>
            <td>${getAppName(d.app_id)}</td>
            <td>${d.locale || '-'}</td>
            <td>${d.timezone != null ? 'UTC' + (d.timezone >= 0 ? '+' : '') + (d.timezone / 60) : '-'}</td>
            <td style="white-space:nowrap;">${timeSince(d.updated_at || d.created_at)}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-ghost btn-sm" style="color:var(--blue);" onclick="sendToDevice('${safeAttr(d.device_token)}')" title="이 디바이스에 전송">📤</button>
              ${d.is_active
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--yellow);" onclick="toggleDeviceActive('${d.id}', false)" title="비활성화">⏸</button>`
                : `<button class="btn btn-ghost btn-sm" style="color:var(--accent);" onclick="toggleDeviceActive('${d.id}', true)" title="활성화">▶</button>`
              }
              <button class="btn btn-ghost btn-sm" style="color:var(--danger-hover);" onclick="deleteDevice('${d.id}')" title="삭제">🗑</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

window.setDeviceFilter = function(filter) {
  deviceFilter = filter;
  loadDevices();
};

window.copyToken = function(token) {
  navigator.clipboard.writeText(token).then(() => {
    showToast('토큰이 클립보드에 복사되었습니다');
  });
};

window.toggleDeviceActive = async function(id, active) {
  const { error } = await supabase.from('devices').update({ is_active: active }).eq('id', id);
  if (error) { showToast('변경 실패: ' + error.message, 'error'); return; }
  showToast(active ? '디바이스가 활성화되었습니다' : '디바이스가 비활성화되었습니다');
  loadDevices();
};

window.deleteDevice = async function(id) {
  if (!confirm('이 디바이스를 삭제하시겠습니까?')) return;
  const { error } = await supabase.from('devices').delete().eq('id', id);
  if (error) { showToast('삭제 실패: ' + error.message, 'error'); return; }
  showToast('디바이스가 삭제되었습니다');
  loadDevices();
};

window.cleanupStaleDevices = async function() {
  const btn = document.getElementById('cleanup-btn');

  const { data: inactive } = await supabase
    .from('devices')
    .select('id')
    .eq('is_active', false);

  const count = inactive?.length || 0;
  if (count === 0) {
    showToast('정리할 비활성 디바이스가 없습니다');
    return;
  }

  if (!confirm(`비활성 디바이스 ${count}개를 삭제하시겠습니까?`)) return;

  btn.disabled = true;
  btn.textContent = '정리 중...';

window.sendImmediate = async function() {
  const appId = document.getElementById('send-app').value;
  const title = document.getElementById('send-title').value.trim();
  const body = document.getElementById('send-body').value.trim();
  const targetVal = document.getElementById('send-target').value;

  if (!title || !body) { showToast('기본 제목과 본문을 입력하세요', 'error'); return; }

  let target;
  if (targetVal === 'device') {
    const token = document.getElementById('send-device-token').value.trim();
    if (!token) { showToast('디바이스 토큰을 입력하세요', 'error'); return; }
    target = { type: 'device', value: token };

};

async function loadSchedules() {
  const container = document.getElementById('schedules-table');
  container.innerHTML = '<div class="loading">불러오는 중...</div>';

  const { data } = await supabase
    .from('push_schedules')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(100);

  const schedules = data || [];

  if (schedules.length === 0) {
    container.innerHTML = '<div class="empty-state">등록된 스케줄이 없습니다</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';
  const statusBadge = s => {
    const cls = s === 'pending' ? 'badge-pending' : s === 'sent' ? 'badge-success' : s === 'cancelled' ? 'badge-cancelled' : 'badge-failed';
    const label = s === 'pending' ? '활성' : s === 'sent' ? '완료' : s === 'cancelled' ? '중지' : s;
    return `<span class="badge ${cls}">${label}</span>`;
  };

  const repeatLabel = r => {
    if (!r) return '1회';
    if (r === 'daily') return '매일';
    if (r.startsWith('weekly:')) return `매주 ${r.replace('weekly:','')}`;
    if (r.startsWith('monthly:')) return `매월 ${r.replace('monthly:','')}일`;
    return r;
  };

  const getTitle = s => {
    if (s.variants && s.variants.length > 0) return `${s.variants[0].title} 외 ${s.variants.length - 1}개`;
    return s.title || '-';
  };

  const calcNextRun = s => {
    if (s.status !== 'pending') return null;
    const base = s.next_run_at || s.scheduled_at;
    if (!base) return null;

    const now = new Date();
    let next = new Date(base);

    if (!s.repeat_rule) return next > now ? next : null;

    if (s.use_local_time && s.local_hour != null) {
      next = new Date(now);
      next.setHours(s.local_hour, s.local_minute ?? 0, 0, 0);
      if (next <= now) next.setDate(next.getDate() + 1);

      if (s.repeat_rule === 'daily') return next;
      if (s.repeat_rule?.startsWith('weekly:')) {
        const dayMap = { sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6 };
        const targetDays = s.repeat_rule.replace('weekly:','').split(',')
          .map(d => dayMap[d.trim().toLowerCase()]).filter(d => d != null);
        if (targetDays.length > 0) {
          for (let i = 0; i < 8; i++) {
            const candidate = new Date(now);
            candidate.setDate(now.getDate() + i);
            candidate.setHours(s.local_hour, s.local_minute ?? 0, 0, 0);
            if (candidate > now && targetDays.includes(candidate.getDay())) return candidate;
          }
        }
        return next;
      }
      if (s.repeat_rule?.startsWith('monthly:')) {
        const targetDate = parseInt(s.repeat_rule.replace('monthly:',''));
        next.setDate(targetDate);
        if (next <= now) next.setMonth(next.getMonth() + 1);
        next.setDate(targetDate);
        return next;
      }
      return next;
    }

    while (next <= now) {
      if (s.repeat_rule === 'daily') next.setDate(next.getDate() + 1);
      else if (s.repeat_rule?.startsWith('weekly:')) next.setDate(next.getDate() + 7);
      else if (s.repeat_rule?.startsWith('monthly:')) next.setMonth(next.getMonth() + 1);
      else break;
    }
    return next > now ? next : null;
  };

  const formatNextRun = s => {
    if (s.status === 'sent') return '완료';
    if (s.status === 'failed') return '실패';
    const next = calcNextRun(s);
    if (!next) return '-';
    return next.toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  };

  container.innerHTML = `
    <table>
      <thead><tr><th>앱</th><th>문구</th><th>반복</th><th>다음 실행</th><th>상태</th><th></th></tr></thead>
      <tbody>
        ${schedules.map(s => `
          <tr>
            <td>${getAppName(s.app_id)}</td>
            <td>${getTitle(s)}</td>
            <td>${repeatLabel(s.repeat_rule)}</td>
            <td style="white-space:nowrap;">${formatNextRun(s)}</td>
            <td>${statusBadge(s.status)}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-ghost btn-sm" onclick="editSchedule('${s.id}')">편집</button>
              ${s.status === 'pending'
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--yellow)" onclick="toggleSchedule('${s.id}','cancelled')">중지</button>`
                : s.status === 'cancelled'
                ? `<button class="btn btn-ghost btn-sm" style="color:var(--accent)" onclick="toggleSchedule('${s.id}','pending')">재활성</button>`
                : ''
              }
              <button class="btn btn-ghost btn-sm" style="color:var(--danger-hover)" onclick="deleteSchedule('${s.id}')">삭제</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

const LOCALES = [
  { value: '', label: '기본 (전체)', flag: '🌐' },
  { value: 'ko', label: '한국어', flag: '🇰🇷' },
  { value: 'en', label: 'English', flag: '🇺🇸' },
  { value: 'es', label: 'Español', flag: '🇪🇸' },
];

function getLocaleInfo(val) {
  return LOCALES.find(l => l.value === (val || '')) || LOCALES[0];
}

function groupVariantsByLocale(variants) {
  const groups = {};
  for (const v of variants) {
    const key = v.locale || '';
    if (!groups[key]) groups[key] = [];
    groups[key].push(v);
  }
  // Always ensure at least the default group exists
  if (!groups['']) groups[''] = [{ title: '', body: '', locale: null }];
  return groups;
}

function renderVariants(variants) {
  const container = document.getElementById('variants-container');
  const groups = groupVariantsByLocale(variants);
  const usedLocales = Object.keys(groups);

  container.innerHTML = usedLocales.map(localeKey => {
    const info = getLocaleInfo(localeKey);
    const items = groups[localeKey];
    const isDefault = localeKey === '';
    return `
      <div class="locale-group" data-locale="${localeKey}">
        <div class="locale-group-header">
          <div class="locale-group-title">
            <span class="locale-flag">${info.flag}</span>
            ${info.label}
            <span class="locale-count">${items.length}개 문구</span>
          </div>
          <div class="locale-group-actions">
            <button class="btn btn-secondary btn-sm" onclick="openBulkModal('${localeKey}')" title="벌크 입력" style="padding:2px 8px; font-size:11px;">📋 벌크</button>
            <button class="btn btn-secondary btn-sm" onclick="addVariantToLocale('${localeKey}')" title="문구 추가" style="padding:2px 8px; font-size:11px;">+ 추가</button>
            ${!isDefault ? `<button class="variant-remove" onclick="removeLocaleGroup('${localeKey}')" title="이 언어 그룹 삭제">×</button>` : ''}
          </div>
        </div>
        <div class="locale-group-body">
          ${items.map((v, i) => `
            <div class="variant-item" data-locale="${localeKey}" data-idx="${i}">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <div class="variant-num">문구 ${i + 1}</div>
                ${items.length > 1 || !isDefault ? `<button class="variant-remove" onclick="removeVariantFromLocale('${localeKey}', ${i})">×</button>` : ''}
              </div>
              <div class="form-group" style="margin-bottom:8px">
                <input type="text" class="var-title" value="${escapeHtml(v.title)}" placeholder="제목">
              </div>
              <div class="form-group" style="margin-bottom:0">
                <textarea class="var-body" rows="2" placeholder="본문">${escapeHtml(v.body)}</textarea>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Render "add locale" buttons for unused locales
  const unusedLocales = LOCALES.filter(l => l.value && !usedLocales.includes(l.value));
  const addArea = document.getElementById('add-locale-area');
  if (unusedLocales.length > 0) {
    addArea.innerHTML = `
      <button class="btn-add-locale" onclick="showLocaleMenu(this)">+ 언어 추가</button>
      <div id="locale-menu" style="display:none; margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;"></div>
    `;
  } else {
    addArea.innerHTML = '';
  }
}

window.showLocaleMenu = function(btn) {
  const groups = groupVariantsByLocale(collectVariants());
  const usedLocales = Object.keys(groups);
  const unusedLocales = LOCALES.filter(l => l.value && !usedLocales.includes(l.value));

  const menu = btn.nextElementSibling;
  if (menu.style.display === 'flex') {
    menu.style.display = 'none';
    return;
  }
  menu.style.display = 'flex';
  menu.innerHTML = unusedLocales.map(l =>
    `<button class="btn btn-secondary btn-sm" onclick="addLocaleGroup('${l.value}')" style="font-size:12px;">${l.flag} ${l.label}</button>`
  ).join('');
};

window.addLocaleGroup = function(locale) {
  const variants = collectVariants();
  variants.push({ title: '', body: '', locale: locale });
  renderVariants(variants);
};

window.removeLocaleGroup = function(locale) {
  const variants = collectVariants().filter(v => (v.locale || '') !== locale);
  renderVariants(variants);
};

window.addVariantToLocale = function(locale) {
  const variants = collectVariants();
  variants.push({ title: '', body: '', locale: locale || null });
  renderVariants(variants);
};

window.removeVariantFromLocale = function(locale, idx) {
  const variants = collectVariants();
  let count = 0;
  const removeIdx = variants.findIndex(v => {
    if ((v.locale || '') === locale) {
      if (count === idx) return true;
      count++;
    }
    return false;
  });
  if (removeIdx >= 0) variants.splice(removeIdx, 1);
  // If group becomes empty and it's default, keep at least one
  const remaining = variants.filter(v => (v.locale || '') === locale);
  if (locale === '' && remaining.length === 0) {
    variants.push({ title: '', body: '', locale: null });
  }
  renderVariants(variants);
};

function collectVariants() {
  const groups = document.querySelectorAll('#variants-container .locale-group');
  const variants = [];
  groups.forEach(group => {
    const locale = group.dataset.locale;
    group.querySelectorAll('.variant-item').forEach(el => {
      variants.push({
        title: el.querySelector('.var-title').value,
        body: el.querySelector('.var-body').value,
        locale: locale || null,
      });
    });
  });
  return variants;
}

function parseBulkText(text) {
  const blocks = text.trim().split(/\n\s*\n/);
  const results = [];
  for (const block of blocks) {
    const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length === 0) continue;
    results.push({
      title: lines[0],
      body: lines.length > 1 ? lines.slice(1).join('\n') : '',
    });
  }
  return results;
}

window.openBulkModal = function(locale) {
  document.getElementById('bulk-modal').style.display = 'flex';
  document.getElementById('bulk-locale').value = locale;
  document.getElementById('bulk-text').value = '';
  document.getElementById('bulk-preview').innerHTML = '';

  const textarea = document.getElementById('bulk-text');
  textarea.oninput = () => {
    const parsed = parseBulkText(textarea.value);
    const preview = document.getElementById('bulk-preview');
    if (parsed.length === 0) {
      preview.innerHTML = '';
      return;
    }
    preview.innerHTML = `<div style="margin-bottom:6px; font-size:11px; color:var(--text-muted);">${parsed.length}개 문구 감지됨</div>` +
      parsed.map((p, i) => `
        <div class="bulk-preview-item">
          <span class="bp-title">${i+1}. ${escapeHtml(p.title)}</span>
          ${p.body ? `<br><span>${escapeHtml(p.body).substring(0, 80)}${p.body.length > 80 ? '…' : ''}</span>` : ''}
        </div>
      `).join('');
  };

  setTimeout(() => textarea.focus(), 100);
};

window.closeBulkModal = function() {
  document.getElementById('bulk-modal').style.display = 'none';
};

window.applyBulk = function() {
  const text = document.getElementById('bulk-text').value;
  const locale = document.getElementById('bulk-locale').value;
  const parsed = parseBulkText(text);

  if (parsed.length === 0) {
    showToast('입력된 문구가 없습니다', 'error');
    return;
  }

  const variants = collectVariants();
  const localeKey = locale || null;

  const hasEmpty = variants.some(v =>
    (v.locale || '') === (locale || '') && !v.title && !v.body
  );
  const filtered = hasEmpty
    ? variants.filter(v => !((v.locale || '') === (locale || '') && !v.title && !v.body))
    : variants;

  for (const p of parsed) {
    filtered.push({ title: p.title, body: p.body, locale: localeKey });
  }

  renderVariants(filtered);
  closeBulkModal();
  showToast(`${parsed.length}개 문구가 추가되었습니다`);
};

window.saveSchedule = async function() {
  const editId = document.getElementById('sched-edit-id').value;
  const appId = document.getElementById('sched-app').value;
  const repeatRule = document.getElementById('sched-repeat').value || null;
  const scheduledAt = document.getElementById('sched-time').value;
  const targetVal = document.getElementById('sched-target').value;
  const untilVal = document.getElementById('sched-until').value;
  const useLocalTime = document.getElementById('sched-local-time').checked;
  const variants = collectVariants().filter(v => v.title || v.body);

  if (!useLocalTime && !scheduledAt) { showToast('예약 시각을 입력하세요', 'error'); return; }
  if (variants.length === 0) { showToast('문구를 하나 이상 입력하세요', 'error'); return; }

  const target = targetVal === 'all'
    ? { type: 'all' }
    : { type: 'segment', value: targetVal };

  const payload = {
    variants,
    title: variants[0]?.title,
    body: variants[0]?.body,
    target,
    scheduled_at: useLocalTime ? new Date().toISOString() : new Date(scheduledAt).toISOString(),
    repeat_rule: repeatRule,
    repeat_until: untilVal ? new Date(untilVal + 'T23:59:59').toISOString() : null,
    use_local_time: useLocalTime,
  };

  if (useLocalTime) {
    const localTimeVal = document.getElementById('sched-local-hour').value;
    if (!localTimeVal) { showToast('현지 시각을 입력하세요', 'error'); return; }
    const [hh, mm] = localTimeVal.split(':').map(Number);
    payload.local_hour = hh;
    payload.local_minute = mm || 0;
  }

  const btn = document.getElementById('sched-save-btn');
  const btnOrigText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    if (editId) {
      await apiCall(`schedule-push?id=${editId}`, 'PATCH', payload, appId);
      showToast('스케줄이 수정되었습니다');
    } else {
      await apiCall('schedule-push', 'POST', payload, appId);
      showToast('스케줄이 생성되었습니다');
    }
    closeScheduleModal();
    loadSchedules();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = btnOrigText;
  }
};

window.editSchedule = async function(id) {
  const { data } = await supabase.from('push_schedules').select('*').eq('id', id).single();
  if (data) openScheduleModal(data);
};

window.toggleSchedule = async function(id, newStatus) {
  const schedule = (await supabase.from('push_schedules').select('app_id').eq('id', id).single()).data;
  if (!schedule) return;
  await apiCall(`schedule-push?id=${id}`, 'PATCH', { status: newStatus }, schedule.app_id);
  showToast(newStatus === 'cancelled' ? '스케줄이 중지되었습니다' : '스케줄이 재활성화되었습니다');
  loadSchedules();
};

window.deleteSchedule = async function(id) {
  if (!confirm('이 스케줄을 삭제하시겠습니까?')) return;
  const { error } = await supabase.from('push_schedules').delete().eq('id', id);
  if (error) { showToast('삭제 실패: ' + error.message, 'error'); return; }
  showToast('스케줄이 삭제되었습니다');
  loadSchedules();
};

  if (events.length === 0) {
    container.innerHTML = '<div class="empty-state">등록된 이벤트 규칙이 없습니다</div>';
    return;
  }

  const getAppName = id => apps.find(a => a.id === id)?.name || '-';

  container.innerHTML = `
    <table>
      <thead><tr><th>앱</th><th>이벤트</th><th>제목 템플릿</th><th>상태</th><th></th></tr></thead>
      <tbody>
        ${events.map(e => `
          <tr>
            <td>${getAppName(e.app_id)}</td>
            <td><code style="background:#21262d;padding:2px 6px;border-radius:4px;font-size:12px;">${e.event_name}</code></td>
            <td>${e.title_template}</td>
            <td><span class="badge ${e.is_active ? 'badge-success' : 'badge-cancelled'}">${e.is_active ? '활성' : '비활성'}</span></td>
            <td style="white-space:nowrap;">
              <button class="btn btn-ghost btn-sm" onclick="editEvent('${e.id}')">편집</button>
              <button class="btn btn-ghost btn-sm" style="color:${e.is_active ? 'var(--yellow)' : 'var(--accent)'}"
                onclick="toggleEvent('${e.id}', ${!e.is_active})">${e.is_active ? '비활성화' : '활성화'}</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

window.openEventModal = function(event) {
  document.getElementById('event-modal').style.display = 'flex';
  document.getElementById('evt-edit-id').value = event?.id || '';
  document.getElementById('event-modal-title').textContent = event ? '이벤트 규칙 편집' : '새 이벤트 규칙';

  document.getElementById('evt-app').value = event?.app_id || (apps[0]?.id ?? '');
  document.getElementById('evt-name').value = event?.event_name || '';
  document.getElementById('evt-title').value = event?.title_template || '';
  document.getElementById('evt-body').value = event?.body_template || '';

  if (event) {
    document.getElementById('evt-name').disabled = true;
  } else {
    document.getElementById('evt-name').disabled = false;
  }
};

window.closeEventModal = function() {
  document.getElementById('event-modal').style.display = 'none';
};

window.saveEvent = async function() {
  const editId = document.getElementById('evt-edit-id').value;
  const appId = document.getElementById('evt-app').value;
  const eventName = document.getElementById('evt-name').value.trim();
  const titleTemplate = document.getElementById('evt-title').value.trim();
  const bodyTemplate = document.getElementById('evt-body').value.trim();

  if (!eventName || !titleTemplate) { showToast('이벤트 이름과 제목 템플릿을 입력하세요', 'error'); return; }

  const btn = document.getElementById('evt-save-btn');
  btn.disabled = true;

  try {
    if (editId) {
      const { error } = await supabase.from('push_events').update({
        title_template: titleTemplate,
        body_template: bodyTemplate,
      }).eq('id', editId);
      if (error) { showToast('수정 실패: ' + error.message, 'error'); return; }
      showToast('이벤트 규칙이 수정되었습니다');
    } else {
      const { error } = await supabase.from('push_events').insert({
        app_id: appId,
        event_name: eventName,
        title_template: titleTemplate,
        body_template: bodyTemplate,
      });
      if (error) { showToast('등록 실패: ' + error.message, 'error'); return; }
      showToast('이벤트 규칙이 생성되었습니다');
    }
    closeEventModal();
    loadEvents();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

window.editEvent = async function(id) {
  const { data } = await supabase.from('push_events').select('*').eq('id', id).single();
  if (data) openEventModal(data);
};

window.toggleEvent = async function(id, active) {
  const { error } = await supabase.from('push_events').update({ is_active: active }).eq('id', id);
  if (error) { showToast('변경 실패: ' + error.message, 'error'); return; }
  showToast(active ? '이벤트 규칙이 활성화되었습니다' : '이벤트 규칙이 비활성화되었습니다');
  loadEvents();
};

// ─── APPS MANAGEMENT ──────────────────────────────────
async function loadAppsTab() {
  const container = document.getElementById('apps-list');
  container.innerHTML = '<div class="loading">불러오는 중...</div>';

  const { data } = await supabase
    .from('apps')
    .select('id, name, app_key, app_secret, fcm_project_id, created_at')
    .order('created_at', { ascending: false });

  const appsList = data || [];

  if (appsList.length === 0) {
    container.innerHTML = '<div class="empty-state">등록된 앱이 없습니다</div>';
    return;
  }

  container.innerHTML = appsList.map(a => `
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div style="font-size:16px; font-weight:600; color:var(--text-bright); margin-bottom:8px;">${escapeHtml(a.name)}</div>
          <div style="font-size:12px; color:var(--text-muted); margin-bottom:4px;">
            <span style="color:var(--text-muted);">App Key:</span>
            <code style="background:#21262d;padding:2px 6px;border-radius:4px;font-size:11px;user-select:all;">${a.app_key}</code>
          </div>
          <div style="font-size:12px; color:var(--text-muted); margin-bottom:4px;">
            <span style="color:var(--text-muted);">App Secret:</span>
            <code style="background:#21262d;padding:2px 6px;border-radius:4px;font-size:11px;user-select:all;">${a.app_secret}</code>
          </div>
          <div style="font-size:12px; color:var(--text-muted);">
            FCM Project: ${a.fcm_project_id ? `<span style="color:var(--accent);">${a.fcm_project_id}</span>` : '<span style="color:var(--yellow);">미설정</span>'}
          </div>
        </div>
        <div style="display:flex; gap:4px;">
          <button class="btn btn-secondary btn-sm" onclick="editApp('${a.id}')">편집</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger-hover)" onclick="deleteApp('${a.id}', '${escapeHtml(a.name)}')">삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

function generateKey(prefix, len) {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let result = prefix;
  for (let i = 0; i < len; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
}

window.openAppModal = function(app) {
  document.getElementById('app-modal').style.display = 'flex';
  document.getElementById('app-edit-id').value = app?.id || '';
  document.getElementById('app-modal-title').textContent = app ? '앱 편집' : '새 앱 등록';
  document.getElementById('app-save-btn').textContent = app ? '저장' : '등록';

  document.getElementById('app-name').value = app?.name || '';
  document.getElementById('app-fcm-project').value = app?.fcm_project_id || '';
  document.getElementById('app-fcm-sa').value = app?.fcm_service_account ? JSON.stringify(app.fcm_service_account, null, 2) : '';
};

window.closeAppModal = function() {
  document.getElementById('app-modal').style.display = 'none';
};

window.saveApp = async function() {
  const editId = document.getElementById('app-edit-id').value;
  const name = document.getElementById('app-name').value.trim();
  const fcmProject = document.getElementById('app-fcm-project').value.trim();
  const fcmSaRaw = document.getElementById('app-fcm-sa').value.trim();

  if (!name) { showToast('앱 이름을 입력하세요', 'error'); return; }

  let fcmSa = null;
  if (fcmSaRaw) {
    try { fcmSa = JSON.parse(fcmSaRaw); } catch { showToast('FCM 서비스 계정 JSON이 올바르지 않습니다', 'error'); return; }
  }

  const btn = document.getElementById('app-save-btn');
  btn.disabled = true;

  try {
    if (editId) {
      const updates = { name, fcm_project_id: fcmProject || null };
      if (fcmSa) updates.fcm_service_account = fcmSa;
      const { error } = await supabase.from('apps').update(updates).eq('id', editId);
      if (error) { showToast('수정 실패: ' + error.message, 'error'); return; }
      showToast('앱 정보가 수정되었습니다');
    } else {
      const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');
      const appKey = slug + '-' + generateKey('', 8);
      const appSecret = generateKey('secret-', 32);
      const { error } = await supabase.from('apps').insert({
        app_key: appKey,
        app_secret: appSecret,
        name,
        fcm_project_id: fcmProject || null,
        fcm_service_account: fcmSa,
      });
      if (error) { showToast('등록 실패: ' + error.message, 'error'); return; }
      showToast('앱이 등록되었습니다');
    }
    closeAppModal();
    await loadApps();
    loadAppsTab();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
};

window.editApp = async function(id) {
  const { data } = await supabase.from('apps').select('*').eq('id', id).single();
  if (data) openAppModal(data);
};

window.deleteApp = async function(id, name) {
  if (!confirm(`"${name}" 앱을 삭제하시겠습니까? 관련된 디바이스, 스케줄, 로그가 모두 삭제됩니다.`)) return;
  const { error } = await supabase.from('apps').delete().eq('id', id);
  if (error) { showToast('삭제 실패: ' + error.message, 'error'); return; }
  showToast('앱이 삭제되었습니다');
  await loadApps();
  loadAppsTab();
};

// ─── UTILS ────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escapeHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── INIT ─────────────────────────────────────────────
function showLoginScreen() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

(async () => {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      await onLogin(session);
    } else {
      showLoginScreen();
    }
  } catch (e) {
    console.error('Session check failed:', e);
    showLoginScreen();
  }
})();

supabase.auth.onAuthStateChange(async (event, session) => {
  try {
    if (session && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED')) {
      await onLogin(session);
    }
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      showLoginScreen();
    }
  } catch (e) {
    console.error('Auth state change failed:', e);
    showLoginScreen();
  }
});
</script>
